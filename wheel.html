<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>决策转盘 - PixelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-black: #1a1a2e;
            --pixel-dark: #16213e;
            --pixel-purple: #4a1942;
            --pixel-magenta: #e94560;
            --pixel-cyan: #00fff5;
            --pixel-yellow: #ffdd00;
            --pixel-green: #39ff14;
            --pixel-orange: #ff6b35;
            --pixel-white: #f1f1f1;
            --pixel-gray: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--pixel-black);
            color: var(--pixel-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.03) 0px,
                rgba(0,0,0,0.03) 1px,
                transparent 1px,
                transparent 2px
            );
        }

        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: linear-gradient(180deg, var(--pixel-dark) 0%, var(--pixel-black) 100%);
            border-bottom: 4px solid var(--pixel-cyan);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--pixel-white);
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: var(--pixel-magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 var(--pixel-cyan), 4px 4px 0 var(--pixel-purple);
        }

        .back-link {
            color: var(--pixel-cyan);
            text-decoration: none;
            font-size: 12px;
            padding: 10px 16px;
            border: 2px solid var(--pixel-cyan);
        }

        .back-link:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }

        .main-content {
            padding-top: 90px;
            padding-bottom: 40px;
            max-width: 520px;
            margin: 0 auto;
            padding-left: 16px;
            padding-right: 16px;
        }

        .page-title {
            font-size: clamp(14px, 4vw, 20px);
            text-align: center;
            margin-bottom: 8px;
            color: var(--pixel-yellow);
            text-shadow: 0 0 10px var(--pixel-yellow);
        }

        .page-subtitle {
            font-size: 13px;
            text-align: center;
            color: var(--pixel-gray);
            margin-bottom: 24px;
        }

        /* ===== 转盘区域 ===== */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 24px;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
        }

        #wheelCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: auto;
        }

        .pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 36px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            line-height: 1;
        }

        .spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff2d55, #a0152f);
            border: 4px solid var(--pixel-yellow);
            color: var(--pixel-white);
            font-family: inherit;
            font-size: 32px;
            box-shadow:
                0 0 20px var(--pixel-magenta),
                0 0 40px rgba(233,69,96,0.3),
                0 5px 0 #7a0f24,
                inset 0 -3px 6px rgba(0,0,0,0.3),
                inset 0 3px 6px rgba(255,255,255,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1;
            filter: drop-shadow(0 2px 0 rgba(0,0,0,0.5));
        }

        .spin-btn:hover:not(:disabled) {
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow:
                0 0 30px var(--pixel-cyan),
                0 0 60px rgba(0,255,245,0.3),
                0 6px 0 #7a0f24,
                inset 0 -3px 6px rgba(0,0,0,0.3),
                inset 0 3px 6px rgba(255,255,255,0.2);
        }

        .spin-btn:active:not(:disabled) {
            transform: translate(-50%, -50%) scale(0.95);
            box-shadow:
                0 0 10px var(--pixel-magenta),
                0 3px 0 #7a0f24,
                inset 0 -3px 6px rgba(0,0,0,0.3),
                inset 0 3px 6px rgba(255,255,255,0.15);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 结果展示 */
        .result-display {
            text-align: center;
            min-height: 80px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-label {
            font-size: 13px;
            color: var(--pixel-cyan);
            margin-bottom: 8px;
        }

        .result-value {
            font-size: clamp(16px, 5vw, 24px);
            color: var(--pixel-yellow);
            text-shadow: 0 0 15px var(--pixel-yellow);
            animation: resultPop 0.5s ease-out;
        }

        @keyframes resultPop {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== 选项管理 ===== */
        .options-card {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-purple);
            padding: 16px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 12px;
            color: var(--pixel-magenta);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--pixel-purple);
        }

        .add-option-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .add-option-row input {
            flex: 1;
            font-family: inherit;
            font-size: 12px;
            padding: 10px 12px;
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-white);
        }

        .add-option-row input::placeholder {
            color: var(--pixel-gray);
            font-size: 12px;
        }

        .add-option-row input:focus {
            outline: none;
            border-color: var(--pixel-cyan);
        }

        .add-btn {
            font-family: inherit;
            font-size: 12px;
            padding: 10px 16px;
            background: var(--pixel-magenta);
            border: 2px solid var(--pixel-magenta);
            color: var(--pixel-white);
            cursor: pointer;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: var(--pixel-cyan);
            border-color: var(--pixel-cyan);
            color: var(--pixel-black);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 260px;
            overflow-y: auto;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            transition: border-color 0.1s;
        }

        .option-item:hover {
            border-color: var(--pixel-cyan);
        }

        .option-color {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .option-text {
            flex: 1;
            font-size: 13px;
            color: var(--pixel-white);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .option-delete {
            background: none;
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-gray);
            font-size: 14px;
            cursor: pointer;
            width: 28px; height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: inherit;
        }

        .option-delete:hover {
            border-color: var(--pixel-magenta);
            color: var(--pixel-magenta);
        }

        /* ===== 预设方案 ===== */
        .presets-card {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-purple);
            padding: 16px;
            margin-bottom: 16px;
        }

        .presets-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .preset-btn {
            font-family: inherit;
            font-size: 12px;
            padding: 10px 8px;
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-white);
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }

        .preset-btn:hover {
            border-color: var(--pixel-cyan);
            color: var(--pixel-cyan);
        }

        /* ===== 工具按钮 ===== */
        .tool-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tool-btn {
            font-family: inherit;
            font-size: 12px;
            padding: 12px;
            background: var(--pixel-dark);
            border: 3px solid var(--pixel-purple);
            color: var(--pixel-white);
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }

        .tool-btn:hover {
            border-color: var(--pixel-cyan);
            color: var(--pixel-cyan);
        }

        /* ===== 历史记录 ===== */
        .history-card {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-purple);
            padding: 16px;
            margin-bottom: 16px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            font-size: 12px;
        }

        .history-result {
            color: var(--pixel-yellow);
        }

        .history-time {
            color: var(--pixel-gray);
            font-size: 11px;
        }

        .empty-hint {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--pixel-gray);
        }

        /* ===== 结果弹窗 ===== */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-overlay .result-emoji {
            font-size: 64px;
            margin-bottom: 16px;
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        .result-overlay .result-text {
            font-size: clamp(18px, 6vw, 28px);
            color: var(--pixel-yellow);
            text-shadow: 0 0 20px var(--pixel-yellow), 2px 2px 0 var(--pixel-purple);
            margin-bottom: 8px;
            text-align: center;
            padding: 0 20px;
        }

        .result-overlay .result-sub {
            font-size: 13px;
            color: var(--pixel-cyan);
            margin-bottom: 32px;
        }

        .result-overlay .close-btn {
            font-family: inherit;
            font-size: 12px;
            padding: 14px 32px;
            background: var(--pixel-magenta);
            border: 3px solid var(--pixel-yellow);
            color: var(--pixel-white);
            cursor: pointer;
        }

        .result-overlay .close-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--pixel-dark);
            border: 3px solid var(--pixel-cyan);
            color: var(--pixel-cyan);
            font-family: inherit;
            font-size: 13px;
            padding: 12px 20px;
            z-index: 2000;
            transition: transform 0.3s;
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">▶</div>
            <span class="logo-text">PIXELPLAY</span>
        </a>
        <a href="index.html" class="back-link">← 返回首页</a>
    </nav>

    <div class="main-content">
        <h1 class="page-title">🎡 决策转盘</h1>
        <p class="page-subtitle">选择困难？转一转就知道！</p>

        <div class="wheel-wrapper">
            <div class="pointer">▼</div>
            <div class="wheel-container">
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
                <button class="spin-btn" id="spinBtn" onclick="spin()">🎰</button>
            </div>
        </div>

        <div class="result-display" id="resultDisplay">
            <div class="result-label" style="display:none" id="resultLabel">🎯 结果</div>
            <div class="result-value" id="resultValue" style="display:none"></div>
        </div>

        <div class="options-card">
            <div class="section-title">✏️ 选项管理</div>
            <div class="add-option-row">
                <input type="text" id="newOption" placeholder="输入新选项..." maxlength="20"
                       onkeydown="if(event.key==='Enter')addOption()">
                <button class="add-btn" onclick="addOption()">添加</button>
            </div>
            <div class="options-list" id="optionsList"></div>
        </div>

        <div class="presets-card">
            <div class="section-title">📦 快速预设</div>
            <div class="presets-grid">
                <button class="preset-btn" onclick="loadPreset('lunch')">🍽️ 今天吃啥</button>
                <button class="preset-btn" onclick="loadPreset('activity')">🎮 干什么好</button>
                <button class="preset-btn" onclick="loadPreset('drink')">🧋 喝点啥</button>
                <button class="preset-btn" onclick="loadPreset('coin')">🪙 抛硬币</button>
            </div>
        </div>

        <div class="tool-row">
            <button class="tool-btn" onclick="clearOptions()">🗑️ 清空选项</button>
            <button class="tool-btn" onclick="clearHistory()">🧹 清空历史</button>
        </div>

        <div class="history-card">
            <div class="section-title">📜 转盘历史</div>
            <div class="history-list" id="historyList">
                <div class="empty-hint">还没有记录，转一个试试！</div>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <div class="result-text" id="overlayResultText"></div>
        <div class="result-sub">命运之轮已选定！</div>
        <button class="close-btn" onclick="closeOverlay()">好的！</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const COLORS = [
        '#e94560', '#00fff5', '#ffdd00', '#39ff14', '#ff6b35',
        '#a855f7', '#f472b6', '#38bdf8', '#fb923c', '#4ade80',
        '#c084fc', '#f87171', '#22d3ee', '#facc15', '#34d399',
        '#e879f9', '#f43f5e', '#06b6d4', '#84cc16', '#f97316'
    ];

    const PRESETS = {
        lunch: ['火锅', '烧烤', '麻辣烫', '汉堡', '寿司', '炸鸡', '披萨', '拉面'],
        activity: ['看电影', '打游戏', '散步', '看书', '刷剧', '睡觉', '运动', '学点东西'],
        drink: ['奶茶', '咖啡', '果汁', '可乐', '柠檬水', '椰子水', '酸奶', '白开水'],
        coin: ['正面', '反面']
    };

    let options = [];
    let history = [];
    let isSpinning = false;
    let currentAngle = 0;
    let winnerIndex = -1; // 用来高亮中奖扇区

    function init() {
        const saved = localStorage.getItem('pixelplay_wheel_options');
        if (saved) {
            options = JSON.parse(saved);
        } else {
            options = [...PRESETS.lunch];
        }
        const savedHistory = localStorage.getItem('pixelplay_wheel_history');
        if (savedHistory) history = JSON.parse(savedHistory);
        renderOptions();
        renderHistory();
        drawWheel();
    }

    function addOption() {
        const input = document.getElementById('newOption');
        const text = input.value.trim();
        if (!text) return;
        if (options.length >= 20) { showToast('最多20个选项！'); return; }
        if (options.includes(text)) { showToast('选项已存在！'); return; }
        options.push(text);
        input.value = '';
        saveOptions();
        renderOptions();
        drawWheel();
    }

    function removeOption(index) {
        if (options.length <= 2) { showToast('至少需要2个选项！'); return; }
        options.splice(index, 1);
        saveOptions();
        renderOptions();
        drawWheel();
    }

    function clearOptions() {
        if (isSpinning) return;
        options = [];
        saveOptions();
        renderOptions();
        drawWheel();
        showToast('已清空所有选项');
    }

    function loadPreset(name) {
        if (isSpinning) return;
        options = [...PRESETS[name]];
        saveOptions();
        renderOptions();
        drawWheel();
        showToast('已加载预设');
    }

    function saveOptions() {
        localStorage.setItem('pixelplay_wheel_options', JSON.stringify(options));
    }

    function renderOptions() {
        const list = document.getElementById('optionsList');
        if (options.length === 0) {
            list.innerHTML = '<div class="empty-hint">添加至少2个选项开始转盘</div>';
            return;
        }
        list.innerHTML = options.map((opt, i) => `
            <div class="option-item">
                <div class="option-color" style="background:${COLORS[i % COLORS.length]}"></div>
                <span class="option-text">${escapeHtml(opt)}</span>
                <button class="option-delete" onclick="removeOption(${i})">✕</button>
            </div>
        `).join('');
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = '<div class="empty-hint">还没有记录，转一个试试！</div>';
            return;
        }
        list.innerHTML = history.slice().reverse().map(h => `
            <div class="history-item">
                <span class="history-result">${escapeHtml(h.result)}</span>
                <span class="history-time">${h.time}</span>
            </div>
        `).join('');
    }

    function clearHistory() {
        history = [];
        localStorage.removeItem('pixelplay_wheel_history');
        renderHistory();
        showToast('历史已清空');
    }

    /**
     * 绘制转盘
     * @param {number} angle - 当前旋转角度
     * @param {number} highlight - 高亮扇区索引（-1表示不高亮）
     */
    function drawWheel(angle, highlight) {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2;
        const cy = h / 2;
        const r = Math.min(cx, cy) - 8;

        ctx.clearRect(0, 0, w, h);

        if (options.length < 2) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = '#16213e';
            ctx.fill();
            ctx.strokeStyle = '#4a1942';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = '#6b7280';
            ctx.font = '14px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('添加选项', cx, cy - 12);
            ctx.fillText('开始转盘', cx, cy + 16);
            return;
        }

        const sliceAngle = (Math.PI * 2) / options.length;
        const rot = (angle !== undefined) ? angle : currentAngle;

        // 外圈阴影
        ctx.beginPath();
        ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffdd00';
        ctx.lineWidth = 6;
        ctx.stroke();

        // 灯泡装饰
        const bulbCount = Math.max(options.length * 2, 24);
        for (let i = 0; i < bulbCount; i++) {
            const a = (i / bulbCount) * Math.PI * 2;
            const bx = cx + Math.cos(a) * (r + 4);
            const by = cy + Math.sin(a) * (r + 4);
            ctx.beginPath();
            ctx.arc(bx, by, 4, 0, Math.PI * 2);
            ctx.fillStyle = i % 2 === 0 ? '#ffdd00' : '#e94560';
            ctx.fill();
        }

        // 绘制每个扇区
        for (let i = 0; i < options.length; i++) {
            const sA = rot + i * sliceAngle;
            const eA = sA + sliceAngle;
            const color = COLORS[i % COLORS.length];

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, sA, eA);
            ctx.closePath();

            // 高亮中奖扇区
            if (highlight === i) {
                ctx.fillStyle = '#fff';
                ctx.fill();
                // 叠加半透明原色
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, sA, eA);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
            } else {
                ctx.fillStyle = color;
                ctx.fill();
            }

            // 分隔线
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(sA) * r, cy + Math.sin(sA) * r);
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 绘制文字（在扇区之上）
        for (let i = 0; i < options.length; i++) {
            const sA = rot + i * sliceAngle;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(sA + sliceAngle / 2);

            const text = options[i];
            const textR = r * 0.6;
            // 根据选项数动态调字号
            let fontSize, maxLen;
            if (options.length <= 4) {
                fontSize = 16; maxLen = 6;
            } else if (options.length <= 8) {
                fontSize = 14; maxLen = 5;
            } else if (options.length <= 12) {
                fontSize = 12; maxLen = 4;
            } else {
                fontSize = 11; maxLen = 3;
            }

            const displayText = text.length > maxLen ? text.substring(0, maxLen) + '..' : text;

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold ${fontSize}px "Press Start 2P"`;

            // 黑色描边增强可读性
            ctx.strokeStyle = 'rgba(0,0,0,0.9)';
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            ctx.strokeText(displayText, textR, 0);

            // 白色填充
            ctx.fillStyle = '#fff';
            ctx.fillText(displayText, textR, 0);

            ctx.restore();
        }

        // 中心装饰圈
        ctx.beginPath();
        ctx.arc(cx, cy, 50, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a2e';
        ctx.fill();
        ctx.strokeStyle = '#ffdd00';
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 45, 0, Math.PI * 2);
        ctx.strokeStyle = '#e94560';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    /**
     * 根据转盘当前角度，算出指针（顶部）指向的扇区索引
     * 指针在画布顶部 = canvas角度 -π/2 (即 3π/2)
     */
    function getSliceAtPointer(rotAngle) {
        const n = options.length;
        const sliceAngle = (Math.PI * 2) / n;
        // 指针在 -π/2
        // 扇区 i 的范围: [rotAngle + i*sliceAngle, rotAngle + (i+1)*sliceAngle]
        // 要找 i 使得 rotAngle + i*sliceAngle <= -π/2 < rotAngle + (i+1)*sliceAngle
        // => (-π/2 - rotAngle) / sliceAngle 向下取整
        let pointer = (-Math.PI / 2 - rotAngle) % (Math.PI * 2);
        // 保证正数
        pointer = ((pointer % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        return Math.floor(pointer / sliceAngle) % n;
    }

    function spin() {
        if (isSpinning || options.length < 2) return;

        isSpinning = true;
        winnerIndex = -1;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('resultLabel').style.display = 'none';
        document.getElementById('resultValue').style.display = 'none';

        // 随机转若干圈 + 随机偏移
        const extraSpins = 5 + Math.random() * 5;
        const randomOffset = Math.random() * Math.PI * 2;
        const totalRotation = extraSpins * Math.PI * 2 + randomOffset;

        const startAngle = currentAngle;
        const duration = 4000 + Math.random() * 1500;
        const startTime = performance.now();
        let lastTickSlice = -1;

        function animate(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 4);
            const angle = startAngle + totalRotation * eased;

            drawWheel(angle);

            // 滴答声
            const curSlice = getSliceAtPointer(angle);
            if (curSlice !== lastTickSlice) {
                lastTickSlice = curSlice;
                playTick(progress < 0.8);
            }

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                // 最终角度
                const finalAngle = startAngle + totalRotation;
                currentAngle = ((finalAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                winnerIndex = getSliceAtPointer(currentAngle);
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;

                // 高亮中奖扇区
                drawWheel(currentAngle, winnerIndex);
                showResult(options[winnerIndex]);
            }
        }

        requestAnimationFrame(animate);
    }

    function showResult(result) {
        document.getElementById('resultLabel').style.display = 'block';
        document.getElementById('resultValue').style.display = 'block';
        document.getElementById('resultValue').textContent = result;
        const el = document.getElementById('resultValue');
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'resultPop 0.5s ease-out';

        const emojis = ['🎉', '🎊', '✨', '🎯', '🔥', '⭐', '🏆', '💫'];
        document.getElementById('resultEmoji').textContent =
            emojis[Math.floor(Math.random() * emojis.length)];
        document.getElementById('overlayResultText').textContent = result;
        document.getElementById('resultOverlay').classList.add('show');

        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        history.push({ result, time: timeStr });
        if (history.length > 50) history = history.slice(-50);
        localStorage.setItem('pixelplay_wheel_history', JSON.stringify(history));
        renderHistory();

        playWin();
    }

    function closeOverlay() {
        document.getElementById('resultOverlay').classList.remove('show');
    }

    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function playTick(strong) {
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'square';
            osc.frequency.value = strong ? 800 : 600;
            gain.gain.value = strong ? 0.08 : 0.04;
            osc.start();
            osc.stop(ctx.currentTime + 0.03);
        } catch(e) {}
    }

    function playWin() {
        try {
            const ctx = getAudioCtx();
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.value = 0.06;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
                osc.start(ctx.currentTime + i * 0.12);
                osc.stop(ctx.currentTime + i * 0.12 + 0.3);
            });
        } catch(e) {}
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    init();
    </script>
</body>
