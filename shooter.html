<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打飞机 - PixelPlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pixel-black: #1a1a2e;
            --pixel-dark: #16213e;
            --pixel-purple: #4a1942;
            --pixel-magenta: #e94560;
            --pixel-cyan: #00fff5;
            --pixel-yellow: #ffdd00;
            --pixel-green: #39ff14;
            --pixel-orange: #ff6b35;
            --pixel-white: #f1f1f1;
            --pixel-gray: #6b7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--pixel-black);
            color: var(--pixel-white);
            touch-action: none;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 2px);
        }
        
        .game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .game-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(26,26,46,0.85) 100%);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 300;
        }
        
        .back-btn {
            background: none;
            border: 2px solid var(--pixel-cyan);
            color: var(--pixel-cyan);
            font-family: inherit;
            font-size: 12px;
            padding: 8px 16px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.1s;
        }
        
        .back-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .game-stats {
            display: flex;
            gap: 24px;
            font-size: 10px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-label { color: var(--pixel-gray); font-size: 12px; }
        .stat-value { color: var(--pixel-yellow); font-size: 22px; font-weight: bold; text-shadow: 0 0 10px var(--pixel-yellow); }
        
        #gameCanvas {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-purple);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
            max-width: 100%;
            max-height: calc(100vh - 160px);
        }
        
        .game-controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(0deg, var(--pixel-dark) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 0 16px;
            z-index: 100;
        }
        
        .control-btn {
            background: var(--pixel-dark);
            border: 3px solid var(--pixel-cyan);
            color: var(--pixel-cyan);
            font-family: inherit;
            font-size: 10px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .control-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .control-btn.primary {
            background: var(--pixel-magenta);
            border-color: var(--pixel-magenta);
            color: var(--pixel-white);
        }
        
        .control-btn.primary:hover {
            background: var(--pixel-cyan);
            border-color: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            text-align: center;
            gap: 16px;
        }
        
        .overlay.hidden { display: none; }
        
        .overlay-title {
            font-size: clamp(20px, 5vw, 32px);
            text-shadow: 0 0 10px var(--pixel-cyan);
        }
        
        .overlay-subtitle {
            font-size: clamp(8px, 2vw, 12px);
            color: var(--pixel-gray);
            line-height: 1.8;
        }
        
        .overlay-score {
            font-size: 14px;
            color: var(--pixel-yellow);
        }
        
        .overlay-btn {
            background: var(--pixel-magenta);
            border: none;
            color: var(--pixel-white);
            font-family: inherit;
            font-size: 12px;
            padding: 16px 48px;
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
            min-width: 180px;
        }
        
        .overlay-btn::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 4px solid var(--pixel-cyan);
        }
        
        .overlay-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .overlay-btn.secondary {
            background: transparent;
            border: 2px solid var(--pixel-gray);
            color: var(--pixel-gray);
        }
        
        .overlay-btn.secondary::before { display: none; }
        
        .overlay-btn.secondary:hover {
            border-color: var(--pixel-cyan);
            color: var(--pixel-cyan);
        }
        
        .hint {
            position: fixed;
            bottom: 90px;
            font-size: 8px;
            color: var(--pixel-gray);
            text-align: center;
        }
        
        @media (pointer: coarse) {
            .hint::after { content: '触摸移动飞机，点击射击'; }
        }
        
        @media (pointer: fine) {
            .hint::after { content: '方向键/WASD 移动，空格射击'; }
        }
        
        /* 武器状态提示 */
        #weaponHint {
            position: fixed;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 400;
            background: rgba(0,0,0,0.85);
            border: 2px solid var(--pixel-cyan);
            padding: 6px 14px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--pixel-cyan);
            display: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header class="game-header">
        <a href="index.html" class="back-btn">← 返回</a>
        <button class="back-btn" id="headerRankBtn">🏆</button>
        <div class="game-stats">
            <div class="stat-item">
                <span class="stat-label">分数:</span>
                <span class="stat-value" id="scoreDisplay">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最高:</span>
                <span class="stat-value" id="bestDisplay">0</span>
            </div>
        </div>
    </header>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div class="hint"></div>
    <div id="weaponHint"></div>
    
    <div class="game-controls">
        <button class="control-btn" id="rankBtn">🏆 排行</button>
        <button class="control-btn" id="pauseBtn">⏸ 暂停</button>
        <button class="control-btn primary" id="restartBtn">🔄 重新开始</button>
    </div>
    
    <div class="overlay" id="startOverlay">
        <h1 class="overlay-title">🚀 打飞机</h1>
        <p class="overlay-subtitle">
            控制你的飞机<br>
            消灭所有敌人！<br><br>
            敌机数字 = 剩余血量<br>
            ⚡💥🔥 图标 = 携带武器<br>
            击毁可获得该武器
        </p>
        <button class="overlay-btn" id="startBtn">开始游戏</button>
        <button class="overlay-btn secondary" id="rankFromStart">🏆 排行榜</button>
        <a href="index.html" class="overlay-btn secondary">返回首页</a>
    </div>
    
    <div class="overlay hidden" id="pauseOverlay">
        <h1 class="overlay-title">⏸ 游戏暂停</h1>
        <button class="overlay-btn" id="resumeBtn">继续游戏</button>
        <button class="overlay-btn secondary" id="restartFromPause">重新开始</button>
    </div>
    
    <div class="overlay hidden" id="gameOverOverlay">
        <h1 class="overlay-title">💥 游戏结束</h1>
        <p class="overlay-score">最终分数: <span id="finalScore">0</span></p>
        <button class="overlay-btn" id="retryBtn">再来一局</button>
        <a href="index.html" class="overlay-btn secondary">返回首页</a>
    </div>

    <script src="js/common.js"></script>
    <script>
        // ===================== 配置 =====================
        const CONFIG = {
            canvasWidth: 400,
            canvasHeight: 600,
            playerWidth: 40,
            playerHeight: 40,
            playerSpeed: 8,
            bulletSpeed: 12,
            enemySpeed: 2.5,
            enemySpawnRate: 80,
            bulletCooldown: 10
        };
        
        // 武器类型定义
        const WEAPON = {
            NORMAL: { name: '普通', color: '#ffdd00', cooldown: 10, icon: '⚪' },
            RAPID:  { name: '⚡射速+', color: '#ff6b35', cooldown: 4, icon: '⚡' },
            SPREAD: { name: '💥散弹', color: '#39ff14', cooldown: 12, icon: '💥' },
            LASER:  { name: '🔥激光', color: '#e94560', cooldown: 18, icon: '🔥' }
        };
        
        const COLORS = {
            bg: '#1a1a2e',
            player: '#00fff5',
            bullet: '#ffdd00',
            enemy: '#e94560',
            enemyAlt: '#ff6b35',
            explosion: '#39ff14',
            star: '#ffffff20'
        };
        
        // ===================== 状态 =====================
        let canvas, ctx;
        let gameState = 'start';
        let score = 0;
        let best = parseInt(localStorage.getItem('shooter_best')) || 0;
        let animationId;
        let frameCount = 0;
        
        let player = { x: 0, y: 0, width: CONFIG.playerWidth, height: CONFIG.playerHeight };
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];
        let bulletCooldown = 0;
        
        // 武器系统
        let currentWeapon = WEAPON.NORMAL;
        let weaponTimer = 0;
        const WEAPON_DURATION = 600;
        
        let keys = {};
        let touchX = null;
        let shooting = false;
        
        // ===================== 初始化 =====================
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            document.getElementById('bestDisplay').textContent = best;
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 键盘
            document.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (e.key === ' ') { e.preventDefault(); shooting = true; }
            });
            document.addEventListener('keyup', e => {
                keys[e.key] = false;
                if (e.key === ' ') shooting = false;
            });
            
            // 触摸
            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                shooting = true;
            });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
            });
            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                touchX = null;
                shooting = false;
            });
            
            // 鼠标
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
                player.x = mouseX - player.width / 2;
                if (player.x < 0) player.x = 0;
                if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            });
            canvas.addEventListener('mousedown', () => shooting = true);
            canvas.addEventListener('mouseup', () => shooting = false);
            
            // 按钮
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('pauseBtn').addEventListener('click', togglePause);
            document.getElementById('resumeBtn').addEventListener('click', resumeGame);
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            document.getElementById('restartFromPause').addEventListener('click', restartGame);
            document.getElementById('retryBtn').addEventListener('click', restartGame);
            
            const rankHandler = () => PixelPlay.showRankModal('shooter', '打飞机');
            document.getElementById('rankBtn').addEventListener('click', rankHandler);
            document.getElementById('headerRankBtn').addEventListener('click', rankHandler);
            document.getElementById('rankFromStart').addEventListener('click', rankHandler);
            
            createStars();
            resetGame();
            PixelPlay.initPixelPlay();
        }
        
        function resizeCanvas() {
            const maxWidth = Math.min(CONFIG.canvasWidth, window.innerWidth - 40);
            const maxHeight = Math.min(CONFIG.canvasHeight, window.innerHeight - 200);
            const ratio = CONFIG.canvasWidth / CONFIG.canvasHeight;
            
            if (maxWidth / maxHeight > ratio) {
                canvas.height = maxHeight;
                canvas.width = maxHeight * ratio;
            } else {
                canvas.width = maxWidth;
                canvas.height = maxWidth / ratio;
            }
            
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - player.height - 20;
        }
        
        function createStars() {
            stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * CONFIG.canvasWidth,
                    y: Math.random() * CONFIG.canvasHeight,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 2 + 1
                });
            }
        }
        
        function resetGame() {
            score = 0;
            bullets = [];
            enemies = [];
            particles = [];
            frameCount = 0;
            bulletCooldown = 0;
            currentWeapon = WEAPON.NORMAL;
            weaponTimer = 0;
            
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - player.height - 20;
            
            updateUI();
            updateWeaponHint();
        }
        
        function startGame() {
            gameState = 'playing';
            document.getElementById('startOverlay').classList.add('hidden');
            gameLoop();
        }
        
        function togglePause() {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pauseOverlay').classList.remove('hidden');
                cancelAnimationFrame(animationId);
            }
        }
        
        function resumeGame() {
            gameState = 'playing';
            document.getElementById('pauseOverlay').classList.add('hidden');
            gameLoop();
        }
        
        function restartGame() {
            gameState = 'playing';
            document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
            resetGame();
            gameLoop();
        }
        
        function gameLoop() {
            if (gameState !== 'playing') return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ===================== 武器系统 =====================
        function updateWeaponHint() {
            const hint = document.getElementById('weaponHint');
            if (currentWeapon !== WEAPON.NORMAL && weaponTimer > 0) {
                const secs = Math.ceil(weaponTimer / 60);
                hint.textContent = currentWeapon.icon + ' ' + currentWeapon.name + ' ' + secs + 's';
                hint.style.display = 'block';
                hint.style.borderColor = currentWeapon.color;
                hint.style.color = currentWeapon.color;
            } else {
                hint.style.display = 'none';
            }
        }
        
        function collectWeapon(weaponType) {
            currentWeapon = weaponType;
            weaponTimer = WEAPON_DURATION;
            updateWeaponHint();
        }
        
        function fireBullet() {
            const cx = player.x + player.width / 2;
            const cy = player.y;
            
            if (currentWeapon === WEAPON.LASER) {
                bullets.push({
                    x: cx - 8,
                    y: cy,
                    width: 16,
                    height: 40,
                    type: 'laser'
                });
            } else if (currentWeapon === WEAPON.SPREAD) {
                for (let i = -1; i <= 1; i++) {
                    bullets.push({
                        x: cx - 3,
                        y: cy,
                        width: 6,
                        height: 15,
                        type: 'spread',
                        vx: i * 2
                    });
                }
            } else {
                bullets.push({
                    x: cx - 3,
                    y: cy,
                    width: 6,
                    height: 15,
                    type: 'normal'
                });
            }
        }
        
        // ===================== 更新逻辑 =====================
        function update() {
            frameCount++;
            
            // 背景星星
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * CONFIG.canvasWidth;
                }
            });
            
            // 键盘移动
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= CONFIG.playerSpeed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += CONFIG.playerSpeed;
            
            // 触摸跟随
            if (touchX !== null) {
                const targetX = touchX - player.width / 2;
                player.x += (targetX - player.x) * 0.15;
            }
            
            // 边界
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            
            // 武器计时
            if (weaponTimer > 0) {
                weaponTimer--;
                if (weaponTimer <= 0) {
                    currentWeapon = WEAPON.NORMAL;
                }
                updateWeaponHint();
            }
            
            // 射击
            if (shooting && bulletCooldown <= 0) {
                fireBullet();
                bulletCooldown = currentWeapon.cooldown;
            }
            if (bulletCooldown > 0) bulletCooldown--;
            
            // 移动子弹
            bullets = bullets.filter(b => {
                if (b.type === 'spread' && b.vx) b.x += b.vx;
                b.y -= CONFIG.bulletSpeed;
                return b.y > -b.height;
            });
            
            // 生成敌人（随时间加快）
            const spawnRate = Math.max(25, CONFIG.enemySpawnRate - Math.floor(frameCount / 300) * 5);
            if (frameCount % spawnRate === 0) {
                const size = 32 + Math.random() * 20;
                
                // 判断是否携带武器（20%概率）
                const hasWeapon = Math.random() < 0.20;
                
                let hp, weapon = null;
                if (hasWeapon) {
                    // 带武器的敌机，血量10-20
                    hp = 10 + Math.floor(Math.random() * 11);
                    // 随机分配武器类型
                    const weaponTypes = [WEAPON.RAPID, WEAPON.SPREAD, WEAPON.LASER];
                    weapon = weaponTypes[Math.floor(Math.random() * 3)];
                } else {
                    // 普通敌机，血量1-5
                    hp = 1 + Math.floor(Math.random() * 5);
                }
                
                enemies.push({
                    x: Math.random() * (canvas.width - size),
                    y: -size,
                    width: size,
                    height: size,
                    speed: CONFIG.enemySpeed + Math.random() * 1.5 + score / 2000,
                    color: Math.random() > 0.5 ? COLORS.enemy : COLORS.enemyAlt,
                    hp: hp,
                    maxHp: hp,
                    flash: 0,
                    weapon: weapon,  // 携带的武器
                    destroyed: false  // 是否已销毁
                });
            }
            
            // 移动敌人 & 碰撞检测
            let playerHit = false;
            
            enemies = enemies.filter(e => {
                if (e.destroyed) return false;  // 已销毁的直接移除
                
                e.y += e.speed;
                if (e.flash > 0) e.flash--;
                
                // 子弹碰撞
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    if (collides(b, e)) {
                        e.hp--;
                        e.flash = 6;
                        score += 5;
                        
                        // 移除子弹
                        bullets.splice(i, 1);
                        
                        // 检查敌机是否被击毁
                        if (e.hp <= 0) {
                            e.destroyed = true;
                            score += 10 + e.maxHp * 5;
                            createExplosion(e.x + e.width / 2, e.y + e.height / 2);
                            
                            // 如果敌机携带武器，则获得该武器
                            if (e.weapon) {
                                collectWeapon(e.weapon);
                            }
                        } else {
                            // 命中粒子
                            for (let j = 0; j < 4; j++) {
                                particles.push({
                                    x: e.x + e.width / 2,
                                    y: e.y + e.height / 2,
                                    vx: (Math.random() - 0.5) * 4,
                                    vy: (Math.random() - 0.5) * 4,
                                    size: 2,
                                    life: 10,
                                    color: '#ffffff'
                                });
                            }
                        }
                        updateUI();
                        break;  // 一颗子弹只命中一个敌机
                    }
                }
                
                // 检查玩家碰撞
                if (!e.destroyed && collides(player, e)) {
                    playerHit = true;
                }
                
                return !e.destroyed && e.y < canvas.height + e.height;
            });
            
            if (playerHit) gameOver();
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
        }
        
        function collides(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }
        
        function createExplosion(x, y) {
            for (let i = 0; i < 15; i++) {
                const angle = (Math.PI * 2 / 15) * i + Math.random() * 0.3;
                const speed = 3 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 3 + Math.random() * 3,
                    life: 25 + Math.random() * 15,
                    color: COLORS.explosion
                });
            }
        }
        
        // ===================== 绘制 =====================
        function draw() {
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 星星
            ctx.fillStyle = COLORS.star;
            stars.forEach(star => ctx.fillRect(star.x, star.y, star.size, star.size));
            
            // 粒子
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            
            // 子弹
            bullets.forEach(b => {
                if (b.type === 'laser') {
                    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.height);
                    grad.addColorStop(0, 'rgba(233,69,96,0)');
                    grad.addColorStop(0.3, 'rgba(233,69,96,1)');
                    grad.addColorStop(0.7, 'rgba(255,255,255,1)');
                    grad.addColorStop(1, 'rgba(233,69,96,0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(b.x, b.y, b.width, b.height);
                } else {
                    const col = b.type === 'spread' ? WEAPON.SPREAD.color : WEAPON.NORMAL.color;
                    ctx.fillStyle = col;
                    ctx.shadowColor = col;
                    ctx.shadowBlur = 8;
                    ctx.fillRect(b.x, b.y, b.width, b.height);
                    ctx.shadowBlur = 0;
                }
            });
            
            // 敌人 + 血量数字 + 武器图标
            enemies.forEach(e => {
                // 像素飞机主体
                ctx.fillStyle = e.flash > 0 ? '#ffffff' : e.color;
                ctx.fillRect(e.x + e.width * 0.3, e.y, e.width * 0.4, e.height * 0.25);
                ctx.fillRect(e.x, e.y + e.height * 0.25, e.width, e.height * 0.5);
                ctx.fillRect(e.x + e.width * 0.15, e.y + e.height * 0.75, e.width * 0.7, e.height * 0.25);
                
                // 血量数字
                const fontSize = Math.max(8, Math.floor(e.width * 0.35));
                ctx.font = `bold ${fontSize}px 'Press Start 2P', monospace`;
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 3;
                ctx.fillText(e.hp, e.x + e.width / 2, e.y + e.height / 2);
                ctx.shadowBlur = 0;
                
                // 武器图标（在敌机右下角）
                if (e.weapon) {
                    ctx.font = `${fontSize}px 'Press Start 2P', monospace`;
                    ctx.fillStyle = e.weapon.color;
                    ctx.shadowColor = e.weapon.color;
                    ctx.shadowBlur = 6;
                    ctx.fillText(e.weapon.icon, e.x + e.width - 4, e.y + e.height - 4);
                    ctx.shadowBlur = 0;
                }
            });
            
            // 玩家
            ctx.fillStyle = COLORS.player;
            ctx.shadowColor = COLORS.player;
            ctx.shadowBlur = 15;
            ctx.fillRect(player.x + player.width * 0.4, player.y, player.width * 0.2, player.height * 0.3);
            ctx.fillRect(player.x + player.width * 0.1, player.y + player.height * 0.3, player.width * 0.8, player.height * 0.4);
            ctx.fillRect(player.x, player.y + player.height * 0.5, player.width, player.height * 0.3);
            ctx.fillRect(player.x + player.width * 0.2, player.y + player.height * 0.8, player.width * 0.6, player.height * 0.2);
            ctx.shadowBlur = 0;
            
            // 引擎火焰（随武器变色）
            if (frameCount % 4 < 2) {
                ctx.fillStyle = currentWeapon.color || COLORS.bullet;
                ctx.fillRect(player.x + player.width * 0.35, player.y + player.height, player.width * 0.3, 8);
            }
        }
        
        function updateUI() {
            document.getElementById('scoreDisplay').textContent = score;
        }
        
        function gameOver() {
            gameState = 'gameover';
            cancelAnimationFrame(animationId);
            
            if (score > best) {
                best = score;
                localStorage.setItem('shooter_best', best);
                document.getElementById('bestDisplay').textContent = best;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
            
            if (PixelPlay.UserManager && PixelPlay.UserManager.hasNickname()) {
                PixelPlay.RankManager.addScore('shooter', score);
            }
        }
        
        init();
    </script>
</body>
</html>
