<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猜数字 - PixelPlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pixel-black: #1a1a2e;
            --pixel-dark: #16213e;
            --pixel-purple: #4a1942;
            --pixel-magenta: #e94560;
            --pixel-cyan: #00fff5;
            --pixel-yellow: #ffdd00;
            --pixel-green: #39ff14;
            --pixel-orange: #ff6b35;
            --pixel-white: #f1f1f1;
            --pixel-gray: #6b7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--pixel-black);
            color: var(--pixel-white);
            touch-action: none;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 2px);
        }
        
        .game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 24px;
        }
        
        .game-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(26,26,46,0.85) 100%);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 300;
        }
        
        .back-btn {
            background: none;
            border: 2px solid var(--pixel-cyan);
            color: var(--pixel-cyan);
            font-family: inherit;
            font-size: 12px;
            padding: 8px 16px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.1s;
        }
        
        .back-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .game-stats {
            display: flex;
            gap: 24px;
            font-size: 10px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .stat-label { color: var(--pixel-gray); font-size: 12px; }
        .stat-value { color: var(--pixel-yellow); font-size: 22px; font-weight: bold; text-shadow: 0 0 10px var(--pixel-yellow); }
        
        .game-title {
            font-size: clamp(16px, 4vw, 24px);
            color: var(--pixel-cyan);
            text-shadow: 0 0 10px var(--pixel-cyan);
            text-align: center;
        }
        
        .hint-text {
            font-size: clamp(10px, 2.5vw, 14px);
            color: var(--pixel-gray);
            text-align: center;
        }
        
        .number-display {
            font-size: clamp(32px, 10vw, 64px);
            color: var(--pixel-magenta);
            text-shadow: 0 0 20px var(--pixel-magenta);
            padding: 20px 40px;
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-purple);
        }
        
        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .number-input {
            font-family: inherit;
            font-size: 24px;
            width: 150px;
            text-align: center;
            padding: 12px;
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-cyan);
            color: var(--pixel-white);
            outline: none;
        }
        
        .number-input:focus {
            box-shadow: 0 0 20px var(--pixel-cyan);
        }
        
        .guess-btn {
            background: var(--pixel-magenta);
            border: none;
            color: var(--pixel-white);
            font-family: inherit;
            font-size: 14px;
            padding: 12px 32px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .guess-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .feedback {
            font-size: clamp(12px, 3vw, 18px);
            min-height: 30px;
            text-align: center;
        }
        
        .feedback.too-high { color: var(--pixel-orange); }
        .feedback.too-low { color: var(--pixel-cyan); }
        .feedback.correct { 
            color: var(--pixel-green); 
            text-shadow: 0 0 20px var(--pixel-green);
            font-size: clamp(16px, 4vw, 24px);
        }
        
        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 300px;
        }
        
        .history-item {
            font-size: 12px;
            padding: 6px 10px;
            background: var(--pixel-dark);
            border: 2px solid var(--pixel-purple);
        }
        
        .history-item.high { border-color: var(--pixel-orange); color: var(--pixel-orange); }
        .history-item.low { border-color: var(--pixel-cyan); color: var(--pixel-cyan); }
        
        .game-controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(0deg, var(--pixel-dark) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 0 16px;
            z-index: 100;
        }
        
        .control-btn {
            background: var(--pixel-dark);
            border: 3px solid var(--pixel-cyan);
            color: var(--pixel-cyan);
            font-family: inherit;
            font-size: 10px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .control-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            text-align: center;
            gap: 20px;
        }
        
        .overlay.hidden { display: none; }
        
        .overlay-title {
            font-size: clamp(20px, 5vw, 32px);
            text-shadow: 0 0 10px var(--pixel-cyan);
        }
        
        .overlay-score {
            font-size: 14px;
            color: var(--pixel-yellow);
        }
        
        .overlay-btn {
            background: var(--pixel-magenta);
            border: none;
            color: var(--pixel-white);
            font-family: inherit;
            font-size: 12px;
            padding: 16px 48px;
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
        }
        
        .overlay-btn::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 4px solid var(--pixel-cyan);
        }
        
        .overlay-btn:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
    </style>
</head>
<body>
    <header class="game-header">
        <a href="index.html" class="back-btn">← 返回</a>
        <div class="game-stats">
            <div class="stat-item">
                <span class="stat-label">次数</span>
                <span class="stat-value" id="attempts">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最佳</span>
                <span class="stat-value" id="best">-</span>
            </div>
        </div>
    </header>
    
    <div class="game-container">
        <h1 class="game-title">🔮 猜数字</h1>
        <p class="hint-text">猜一个 1-100 之间的数字</p>
        
        <div class="number-display" id="display">?</div>
        
        <div class="feedback" id="feedback"></div>
        
        <div class="input-area">
            <input type="number" class="number-input" id="guessInput" min="1" max="100" placeholder="1-100">
            <button class="guess-btn" id="guessBtn">猜!</button>
        </div>
        
        <div class="history" id="history"></div>
    </div>
    
    <div class="game-controls">
        <button class="control-btn" id="rankBtn">🏆 排行</button>
        <button class="control-btn" id="newGameBtn">🔄 新游戏</button>
    </div>
    
    <div class="overlay hidden" id="winOverlay">
        <h1 class="overlay-title">🎉 猜对了!</h1>
        <p class="overlay-score">答案就是 <span id="answer">0</span></p>
        <p class="overlay-score">用了 <span id="finalAttempts">0</span> 次</p>
        <button class="overlay-btn" id="retryBtn">再来一局</button>
    </div>

    <script src="js/common.js"></script>
    <script>
        let target = 0;
        let attempts = 0;
        let best = parseInt(localStorage.getItem('guess_best')) || null;
        let history = [];
        let gameOver = false;
        
        function init() {
            if (best) document.getElementById('best').textContent = best;
            newGame();
            
            document.getElementById('guessBtn').addEventListener('click', makeGuess);
            document.getElementById('guessInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') makeGuess();
            });
            document.getElementById('newGameBtn').addEventListener('click', newGame);
            document.getElementById('retryBtn').addEventListener('click', () => {
                document.getElementById('winOverlay').classList.add('hidden');
                newGame();
            });
            document.getElementById('rankBtn').addEventListener('click', () => {
                PixelPlay.showRankModal('guess', '猜数字');
            });
            PixelPlay.initPixelPlay();
        }
        
        function newGame() {
            target = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            history = [];
            gameOver = false;
            
            document.getElementById('display').textContent = '?';
            document.getElementById('attempts').textContent = '0';
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('history').innerHTML = '';
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('guessBtn').disabled = false;
            
            document.getElementById('guessInput').focus();
        }
        
        function makeGuess() {
            if (gameOver) return;
            
            const input = document.getElementById('guessInput');
            const guess = parseInt(input.value);
            
            if (isNaN(guess) || guess < 1 || guess > 100) {
                document.getElementById('feedback').textContent = '请输入 1-100 之间的数字!';
                document.getElementById('feedback').className = 'feedback';
                return;
            }
            
            attempts++;
            document.getElementById('attempts').textContent = attempts;
            document.getElementById('display').textContent = guess;
            
            const feedbackEl = document.getElementById('feedback');
            const historyEl = document.getElementById('history');
            
            if (guess === target) {
                feedbackEl.textContent = '🎉 猜对了!';
                feedbackEl.className = 'feedback correct';
                gameOver = true;
                
                if (!best || attempts < best) {
                    best = attempts;
                    localStorage.setItem('guess_best', best);
                    document.getElementById('best').textContent = best;
                }
                
                setTimeout(() => {
                    document.getElementById('answer').textContent = target;
                    document.getElementById('finalAttempts').textContent = attempts;
                    document.getElementById('winOverlay').classList.remove('hidden');
                    if (PixelPlay.UserManager.hasNickname()) {
                        PixelPlay.RankManager.addScore('guess', attempts);
                    }
                }, 500);
            } else if (guess > target) {
                feedbackEl.textContent = '⬆️ 太大了!';
                feedbackEl.className = 'feedback too-high';
                addToHistory(guess, 'high');
            } else {
                feedbackEl.textContent = '⬇️ 太小了!';
                feedbackEl.className = 'feedback too-low';
                addToHistory(guess, 'low');
            }
            
            input.value = '';
            input.focus();
        }
        
        function addToHistory(num, type) {
            history.push({num, type});
            const el = document.createElement('span');
            el.className = `history-item ${type}`;
            el.textContent = num + (type === 'high' ? '↓' : '↑');
            document.getElementById('history').appendChild(el);
        }
        
        init();
    </script>
</body>
</html>
