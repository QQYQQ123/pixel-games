<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>牛马人工作薪资计算器 - PixelPlay</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pixel-black: #1a1a2e;
            --pixel-dark: #16213e;
            --pixel-purple: #4a1942;
            --pixel-magenta: #e94560;
            --pixel-cyan: #00fff5;
            --pixel-yellow: #ffdd00;
            --pixel-green: #39ff14;
            --pixel-orange: #ff6b35;
            --pixel-white: #f1f1f1;
            --pixel-gray: #6b7280;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--pixel-black);
            color: var(--pixel-white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.03) 0px,
                rgba(0,0,0,0.03) 1px,
                transparent 1px,
                transparent 2px
            );
        }
        
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: linear-gradient(180deg, var(--pixel-dark) 0%, var(--pixel-black) 100%);
            border-bottom: 4px solid var(--pixel-cyan);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--pixel-white);
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--pixel-magenta);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 var(--pixel-cyan), 4px 4px 0 var(--pixel-purple);
        }
        
        .back-link {
            color: var(--pixel-cyan);
            text-decoration: none;
            font-size: 10px;
            padding: 10px 16px;
            border: 2px solid var(--pixel-cyan);
            transition: all 0.1s;
        }
        
        .back-link:hover {
            background: var(--pixel-cyan);
            color: var(--pixel-black);
        }
        
        .main-content {
            padding-top: 90px;
            padding-bottom: 40px;
            max-width: 480px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
        }
        
        .page-title {
            font-size: clamp(14px, 4vw, 20px);
            text-align: center;
            margin-bottom: 10px;
            color: var(--pixel-yellow);
            text-shadow: 0 0 10px var(--pixel-yellow);
        }
        
        .page-subtitle {
            font-size: 12px;
            text-align: center;
            color: var(--pixel-gray);
            margin-bottom: 24px;
        }
        
        .countdown-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: var(--pixel-purple);
            padding: 16px;
            margin-bottom: 24px;
            border: 3px solid var(--pixel-magenta);
        }
        
        .countdown-item {
            text-align: center;
        }
        
        .countdown-label {
            display: block;
            font-size: 12px;
            color: var(--pixel-gray);
            margin-bottom: 6px;
        }
        
        .countdown-value {
            font-size: 14px;
            color: var(--pixel-yellow);
            text-shadow: 0 0 10px var(--pixel-yellow);
        }
        
        .countdown-divider {
            font-size: 20px;
            color: var(--pixel-gray);
        }
        
        .calc-card {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-purple);
            padding: 24px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-label {
            display: block;
            font-size: 12px;
            color: var(--pixel-cyan);
            margin-bottom: 8px;
        }
        
        .input-field {
            font-family: inherit;
            font-size: 12px;
            width: 100%;
            padding: 12px;
            background: var(--pixel-black);
            border: 3px solid var(--pixel-purple);
            color: var(--pixel-white);
            outline: none;
            transition: border-color 0.1s;
        }
        
        .input-field:focus {
            border-color: var(--pixel-cyan);
            box-shadow: 0 0 15px rgba(0,255,245,0.2);
        }
        
        .input-field::placeholder {
            color: var(--pixel-gray);
        }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        @media (max-width: 480px) {
            .input-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">▶</div>
            <span class="logo-text">PIXELPLAY</span>
        </a>
        <a href="index.html" class="back-link">← 返回首页</a>
    </nav>
    
    <div class="main-content">
        <h1 class="page-title">💰 牛马人工作薪资计算器</h1>
        <p class="page-subtitle">算算你到底值不值</p>
        
        <div class="countdown-bar">
            <div class="countdown-item">
                <span class="countdown-label">距离下班</span>
                <span class="countdown-value" id="countdown">--:--:--</span>
            </div>
            <div class="countdown-divider">|</div>
            <div class="countdown-item">
                <span class="countdown-label">今日已赚</span>
                <span class="countdown-value" id="todayEarned">¥0.00</span>
            </div>
        </div>
        
        <div class="calc-card">
            <div class="input-group">
                <label class="input-label">月薪（元）</label>
                <input type="number" class="input-field" id="salary" placeholder="如 15000">
            </div>
            
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label">上班时间</label>
                    <input type="time" class="input-field" id="workStart" value="09:00">
                </div>
                <div class="input-group">
                    <label class="input-label">下班时间</label>
                    <input type="time" class="input-field" id="workEnd" value="18:00">
                </div>
            </div>
            
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label">工作天数（天/月）</label>
                    <input type="number" class="input-field" id="workDays" placeholder="如 22" value="22">
                </div>
                <div class="input-group">
                    <label class="input-label">每天通勤时间（小时/天）</label>
                    <input type="number" class="input-field" id="commuteHours" placeholder="如 2" step="0.5" value="2">
                </div>
            </div>
            

        </div>
    </div>
    
    <script>
        // 倒计时和今日已赚更新
        function updateCountdown() {
            const now = new Date();
            
            // 从输入框获取上下班时间
            const workStartInput = document.getElementById('workStart').value || '09:00';
            const workEndInput = document.getElementById('workEnd').value || '18:00';
            const [startHour, startMin] = workStartInput.split(':').map(Number);
            const [endHour, endMin] = workEndInput.split(':').map(Number);
            
            // 获取今天下班时间
            const today = new Date(now);
            const endTime = new Date(today);
            endTime.setHours(endHour, endMin, 0, 0);
            
            // 计算剩余时间
            let diff = endTime - now;
            
            if (diff <= 0) {
                // 已经下班
                document.getElementById('countdown').textContent = '已下班';
                document.getElementById('countdown').style.color = 'var(--pixel-green)';
            } else {
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdown').textContent = 
                    String(hours).padStart(2, '0') + ':' + 
                    String(minutes).padStart(2, '0') + ':' + 
                    String(seconds).padStart(2, '0');
                document.getElementById('countdown').style.color = 'var(--pixel-yellow)';
            }
            
            // 计算今日已赚
            const salary = parseFloat(document.getElementById('salary').value) || 0;
            const workDays = parseFloat(document.getElementById('workDays').value) || 22;
            
            // 计算工作时长（小时）
            const workDuration = (endHour + endMin/60) - (startHour + startMin/60);
            
            if (salary > 0 && workDuration > 0) {
                // 获取今天开始和结束时间
                const todayStart = new Date(today);
                todayStart.setHours(startHour, startMin, 0, 0);
                
                const todayEnd = new Date(today);
                todayEnd.setHours(endHour, endMin, 0, 0);
                
                let workedSeconds = 0;
                if (now >= todayEnd) {
                    workedSeconds = (todayEnd - todayStart) / 1000;
                } else if (now >= todayStart) {
                    workedSeconds = (now - todayStart) / 1000;
                }
                
                const dailySalary = salary / workDays;
                const hourlyRate = dailySalary / workDuration;
                const todayEarned = (workedSeconds / 3600) * hourlyRate;
                
                document.getElementById('todayEarned').textContent = '¥' + todayEarned.toFixed(2);
            }
        }
        
        // 每秒更新倒计时
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
