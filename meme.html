<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>表情包生成器 - PixelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-black: #1a1a2e;
            --pixel-dark: #16213e;
            --pixel-purple: #4a1942;
            --pixel-magenta: #e94560;
            --pixel-cyan: #00fff5;
            --pixel-yellow: #ffdd00;
            --pixel-green: #39ff14;
            --pixel-orange: #ff6b35;
            --pixel-white: #f1f1f1;
            --pixel-gray: #6b7280;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Press Start 2P', monospace;
            background: var(--pixel-black);
            color: var(--pixel-white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,.03) 0px, rgba(0,0,0,.03) 1px, transparent 1px, transparent 2px);
        }
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: linear-gradient(180deg, var(--pixel-dark), var(--pixel-black));
            border-bottom: 3px solid var(--pixel-cyan);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 1000;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--pixel-white); }
        .logo-icon { width: 32px; height: 32px; background: var(--pixel-magenta); display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .logo-text { font-size: 12px; letter-spacing: 1px; }
        .back-link { color: var(--pixel-cyan); text-decoration: none; font-size: 12px; padding: 10px 16px; border: 2px solid var(--pixel-cyan); }
        .back-link:hover { background: var(--pixel-cyan); color: var(--pixel-black); }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 80px 16px 32px;
        }

        .page-title {
            font-size: 14px; color: var(--pixel-yellow); text-align: center;
            margin-bottom: 20px; text-shadow: 2px 2px 0 var(--pixel-purple);
        }
        .page-sub { font-size: 11px; color: var(--pixel-gray); text-align: center; margin-bottom: 24px; line-height: 2; }

        /* 上传区 */
        .upload-area {
            border: 3px dashed var(--pixel-purple);
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.15s;
            background: var(--pixel-dark);
        }
        .upload-area:hover, .upload-area.dragover { border-color: var(--pixel-cyan); background: rgba(0,255,245,.05); }
        .upload-icon { font-size: 40px; margin-bottom: 12px; }
        .upload-text { font-size: 12px; color: var(--pixel-gray); }
        .upload-text span { color: var(--pixel-cyan); }
        .upload-hint { font-size: 11px; color: var(--pixel-gray); opacity: 0.6; margin-top: 8px; }

        /* 图片预览 + 文字叠加区 */
        .preview-wrap {
            position: relative;
            display: none;
            margin-bottom: 20px;
        }
        .preview-wrap.active { display: block; }

        #previewCanvas {
            display: block;
            width: 100%;
            image-rendering: auto;
            border: 3px solid var(--pixel-purple);
        }

        /* 文字样式控制 */
        .text-controls {
            background: var(--pixel-dark);
            border: 3px solid var(--pixel-purple);
            padding: 16px;
            margin-bottom: 20px;
        }
        .ctrl-title { font-size: 12px; color: var(--pixel-yellow); margin-bottom: 14px; }

        .ctrl-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px;
        }
        .ctrl-label { font-size: 12px; color: var(--pixel-gray); width: 70px; flex-shrink: 0; }

        .ctrl-row input[type="text"] {
            flex: 1;
            font-family: inherit;
            font-size: 12px;
            padding: 10px 12px;
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-white);
            outline: none;
        }
        .ctrl-row input[type="text"]:focus { border-color: var(--pixel-cyan); }
        .ctrl-row input[type="color"] {
            width: 40px; height: 36px;
            border: 2px solid var(--pixel-purple);
            background: none; cursor: pointer; padding: 0;
        }
        .ctrl-row input[type="range"] { flex: 1; accent-color: var(--pixel-cyan); }
        .ctrl-row .val { font-size: 12px; color: var(--pixel-cyan); width: 32px; text-align: right; }
        .ctrl-row select {
            flex: 1; font-family: inherit; font-size: 12px;
            padding: 8px 10px; background: var(--pixel-black);
            border: 2px solid var(--pixel-purple); color: var(--pixel-white); outline: none;
        }
        .ctrl-row select:focus { border-color: var(--pixel-cyan); }

        .text-size-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .text-size-row .label { font-size: 12px; color: var(--pixel-gray); width: 70px; }
        .text-size-row input[type="range"] { flex: 1; accent-color: var(--pixel-cyan); }
        .text-size-row .val { font-size: 12px; color: var(--pixel-cyan); }

        /* 快捷模板 */
        .templates-section {
            background: var(--pixel-dark);
            border: 3px solid var(--pixel-purple);
            padding: 14px;
            margin-bottom: 20px;
        }
        .templates-title { font-size: 12px; color: var(--pixel-yellow); margin-bottom: 12px; }
        .template-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .template-btn {
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-white);
            font-family: inherit;
            font-size: 14px;
            padding: 12px 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }
        .template-btn:hover { border-color: var(--pixel-cyan); color: var(--pixel-cyan); }
        .template-btn.active { border-color: var(--pixel-yellow); color: var(--pixel-yellow); background: rgba(255,221,0,.1); }
        .template-btn .t-icon { font-size: 24px; display: block; margin-bottom: 6px; }
        .template-btn .t-name { font-size: 11px; display: block; }

        /* 操作按钮 */
        .action-btns {
            display: flex; gap: 10px;
        }
        .action-btn {
            flex: 1; font-family: inherit; font-size: 13px;
            padding: 16px 14px; cursor: pointer; text-align: center;
            border: 3px solid; transition: all 0.1s;
        }
        .action-btn.primary {
            background: var(--pixel-magenta); border-color: var(--pixel-magenta);
            color: var(--pixel-white);
        }
        .action-btn.primary:hover { background: var(--pixel-cyan); border-color: var(--pixel-cyan); color: var(--pixel-black); }
        .action-btn.secondary {
            background: transparent; border-color: var(--pixel-purple);
            color: var(--pixel-white);
        }
        .action-btn.secondary:hover { border-color: var(--pixel-cyan); color: var(--pixel-cyan); }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--pixel-yellow); color: var(--pixel-black);
            font-family: 'Press Start 2P', monospace; font-size: 12px;
            padding: 14px 24px; z-index: 9999;
            display: none; white-space: nowrap;
        }
        .toast.show { display: block; animation: toastIn 0.3s; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* 隐藏的 file input */
        #fileInput { display: none; }

        /* CRT */
        .crt::after {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px);
            pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body class="crt">

    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">▶</div>
            <span class="logo-text">PIXELPLAY</span>
        </a>
        <a href="index.html" class="back-link">← 首页</a>
    </nav>

    <div class="container">
        <h1 class="page-title">🎭 表情包生成器</h1>
        <p class="page-sub">上传图片 → 加文字 → 一键下载<br>支持拖拽上传，完美像素风渲染</p>

        <!-- 上传区 -->
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">点击上传图片，或<span>拖拽</span>到这里</div>
            <div class="upload-hint">支持 JPG / PNG / GIF / WEBP</div>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <!-- 预览区 -->
        <div class="preview-wrap" id="previewWrap">
            <canvas id="previewCanvas"></canvas>
        </div>

        <!-- 文字控制 -->
        <div class="text-controls">
            <div class="ctrl-title">✏️ 文字设置</div>

            <!-- 顶部文字 -->
            <div class="ctrl-row">
                <span class="ctrl-label">顶部文字</span>
                <input type="text" id="topText" placeholder="输入顶部文字..." maxlength="30" oninput="renderPreview()">
            </div>
            <div class="text-size-row">
                <span class="label">字体大小</span>
                <input type="range" id="topSize" min="12" max="60" value="28" oninput="document.getElementById('topSizeVal').textContent=this.value;renderPreview()">
                <span class="val" id="topSizeVal">28</span>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">文字颜色</span>
                <input type="color" id="topColor" value="#ffffff" onchange="renderPreview()">
                <select id="topShadow" onchange="renderPreview()">
                    <option value="black">黑色描边</option>
                    <option value="white">白色描边</option>
                    <option value="none">无描边</option>
                </select>
            </div>

            <!-- 底部文字 -->
            <div class="ctrl-row" style="margin-top:16px;">
                <span class="ctrl-label">底部文字</span>
                <input type="text" id="bottomText" placeholder="输入底部文字..." maxlength="30" oninput="renderPreview()">
            </div>
            <div class="text-size-row">
                <span class="label">字体大小</span>
                <input type="range" id="bottomSize" min="12" max="60" value="28" oninput="document.getElementById('bottomSizeVal').textContent=this.value;renderPreview()">
                <span class="val" id="bottomSizeVal">28</span>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">文字颜色</span>
                <input type="color" id="bottomColor" value="#ffffff" onchange="renderPreview()">
                <select id="bottomShadow" onchange="renderPreview()">
                    <option value="black">黑色描边</option>
                    <option value="white">白色描边</option>
                    <option value="none">无描边</option>
                </select>
            </div>

            <!-- 效果 -->
            <div class="ctrl-row" style="margin-top:16px;">
                <span class="ctrl-label">滤镜效果</span>
                <select id="filterSelect" onchange="renderPreview()">
                    <option value="none">无效果</option>
                    <option value="pixelate">像素化</option>
                    <option value="grayscale">黑白</option>
                    <option value="sepia">复古</option>
                    <option value="vintage">怀旧</option>
                </select>
            </div>
        </div>

        <!-- 快捷模板 -->
        <div class="templates-section">
            <div class="templates-title">📋 快捷模板（自动加文字）</div>
            <div class="template-grid">
                <button class="template-btn" onclick="applyTemplate('warning')">
                    <span class="t-icon">⚠️</span>
                    <span class="t-name">悲报</span>
                </button>
                <button class="template-btn" onclick="applyTemplate('good')">
                    <span class="t-icon">🎉</span>
                    <span class="t-name">喜报</span>
                </button>
                <button class="template-btn" onclick="applyTemplate('question')">
                    <span class="t-icon">❓</span>
                    <span class="t-name">问号</span>
                </button>
                <button class="template-btn" onclick="applyTemplate('shock')">
                    <span class="t-icon">😱</span>
                    <span class="t-name">震惊</span>
                </button>
                <button class="template-btn" onclick="applyTemplate('laugh')">
                    <span class="t-icon">😂</span>
                    <span class="t-name">笑死</span>
                </button>
                <button class="template-btn" onclick="applyTemplate('cry')">
                    <span class="t-icon">😭</span>
                    <span class="t-name">哭死</span>
                </button>
                <button class="template-btn" onclick="applyTemplate('angry')">
                    <span class="t-icon">😡</span>
                    <span class="t-name">生气</span>
                </button>
                <button class="template-btn" onclick="applyTemplate('love')">
                    <span class="t-icon">❤️</span>
                    <span class="t-name">爱心</span>
                </button>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-btns">
            <button class="action-btn secondary" onclick="clearImage()">🗑️ 清除</button>
            <button class="action-btn primary" id="downloadBtn" onclick="downloadMeme()" disabled>💾 下载表情包</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    var canvas, ctx;
    var originalImage = null; // 原始 Image 对象

    var TEMPLATES = {
        warning: { top: '重 要 通 知', bottom: '', topSize: 36, bottomSize: 28 },
        good:    { top: '喜  报',    bottom: '转发功德+1', topSize: 44, bottomSize: 22 },
        question:{ top: '',          bottom: '？？？',     topSize: 28, bottomSize: 48 },
        shock:   { top: '震惊！',   bottom: '竟然是这样的', topSize: 32, bottomSize: 24 },
        laugh:   { top: '',          bottom: '笑死我了哈哈哈哈', topSize: 28, bottomSize: 24 },
        cry:     { top: '',          bottom: '我哭了😭',  topSize: 28, bottomSize: 36 },
        angry:   { top: '气死我了！', bottom: '',        topSize: 36, bottomSize: 28 },
        love:    { top: '',          bottom: '我永远喜欢', topSize: 28, bottomSize: 32 }
    };

    function init() {
        canvas = document.getElementById('previewCanvas');
        ctx = canvas.getContext('2d');

        var ua = document.getElementById('uploadArea');
        ua.addEventListener('click', function() { document.getElementById('fileInput').click(); });
        ua.addEventListener('dragover', function(e) { e.preventDefault(); ua.classList.add('dragover'); });
        ua.addEventListener('dragleave', function() { ua.classList.remove('dragover'); });
        ua.addEventListener('drop', function(e) {
            e.preventDefault(); ua.classList.remove('dragover');
            var f = e.dataTransfer.files[0];
            if (f && f.type.startsWith('image/')) loadImage(f);
        });
        document.getElementById('fileInput').addEventListener('change', function() {
            if (this.files[0]) loadImage(this.files[0]);
        });
    }

    function loadImage(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                originalImage = img;

                // 限制最大尺寸
                var maxW = Math.min(640, window.innerWidth - 32);
                var maxH = 500;
                var scale = Math.min(maxW / img.width, maxH / img.height, 1);
                canvas.width = Math.round(img.width * scale);
                canvas.height = Math.round(img.height * scale);

                document.getElementById('previewWrap').classList.add('active');
                document.getElementById('downloadBtn').disabled = false;
                renderPreview();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function renderPreview() {
        if (!originalImage) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 画原图
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

        // 应用滤镜
        applyFilter();

        // 画顶部文字
        var topText = document.getElementById('topText').value;
        var topSize = parseInt(document.getElementById('topSize').value);
        var topColor = document.getElementById('topColor').value;
        var topShadow = document.getElementById('topShadow').value;
        if (topText) drawMemeText(topText, topSize, topColor, topShadow, 'top');

        // 画底部文字
        var bottomText = document.getElementById('bottomText').value;
        var bottomSize = parseInt(document.getElementById('bottomSize').value);
        var bottomColor = document.getElementById('bottomColor').value;
        var bottomShadow = document.getElementById('bottomShadow').value;
        if (bottomText) drawMemeText(bottomText, bottomSize, bottomColor, bottomShadow, 'bottom');
    }

    function applyFilter() {
        var filter = document.getElementById('filterSelect').value;
        var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        var d = imgData.data;

        if (filter === 'grayscale') {
            for (var i = 0; i < d.length; i += 4) {
                var g = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
                d[i] = d[i+1] = d[i+2] = g;
            }
        } else if (filter === 'sepia') {
            for (var i = 0; i < d.length; i += 4) {
                var r = d[i], g = d[i+1], b = d[i+2];
                d[i]   = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
                d[i+1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
                d[i+2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
            }
        } else if (filter === 'vintage') {
            for (var i = 0; i < d.length; i += 4) {
                var r = d[i], g = d[i+1], b = d[i+2];
                d[i]   = Math.min(255, r * 0.9 + 30);
                d[i+1] = Math.min(255, g * 0.8 + 20);
                d[i+2] = Math.min(255, b * 0.6 + 10);
                d[i+3] = Math.min(255, (d[i]+d[i+1]+d[i+2])/3 * 0.5);
            }
        } else if (filter === 'pixelate') {
            // 缩小再放大实现像素化
            var tmpCanvas = document.createElement('canvas');
            var pixelSize = 6;
            tmpCanvas.width = Math.ceil(canvas.width / pixelSize);
            tmpCanvas.height = Math.ceil(canvas.height / pixelSize);
            var tmpCtx = tmpCanvas.getContext('2d');
            tmpCtx.drawImage(canvas, 0, 0, tmpCanvas.width, tmpCanvas.height);
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tmpCanvas, 0, 0, tmpCanvas.width, tmpCanvas.height, 0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = true;
            return; // 已经画了，不要再 putImageData
        }

        ctx.putImageData(imgData, 0, 0);
    }

    function drawMemeText(text, size, color, shadow, pos) {
        var fontSize = Math.round(size * (canvas.width / 640));
        ctx.font = `bold ${fontSize}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = pos === 'top' ? 'top' : 'bottom';

        var x = canvas.width / 2;
        var y = pos === 'top' ? fontSize * 0.6 : canvas.height - fontSize * 0.3;

        // 描边
        if (shadow !== 'none') {
            ctx.strokeStyle = shadow === 'black' ? '#000' : '#fff';
            ctx.lineWidth = fontSize * 0.15;
            ctx.lineJoin = 'round';
            ctx.strokeText(text, x, y);
        }

        // 阴影（发光效果）
        ctx.shadowColor = '#000';
        ctx.shadowBlur = fontSize * 0.3;
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
        ctx.shadowBlur = 0;
    }

    function applyTemplate(name) {
        var t = TEMPLATES[name];
        if (!t) return;
        document.getElementById('topText').value = t.top;
        document.getElementById('topSize').value = t.topSize;
        document.getElementById('topSizeVal').textContent = t.topSize;
        document.getElementById('bottomText').value = t.bottom;
        document.getElementById('bottomSize').value = t.bottomSize;
        document.getElementById('bottomSizeVal').textContent = t.bottomSize;
        renderPreview();

        // 高亮当前模板
        document.querySelectorAll('.template-btn').forEach(function(b) { b.classList.remove('active'); });
        event.target.closest('.template-btn').classList.add('active');
    }

    function clearImage() {
        originalImage = null;
        document.getElementById('previewWrap').classList.remove('active');
        document.getElementById('downloadBtn').disabled = true;
        document.getElementById('topText').value = '';
        document.getElementById('bottomText').value = '';
        document.getElementById('fileInput').value = '';
        document.querySelectorAll('.template-btn').forEach(function(b) { b.classList.remove('active'); });
    }

    function downloadMeme() {
        if (!originalImage) return;

        // 创建全尺寸 canvas 用于下载
        var dlCanvas = document.createElement('canvas');
        dlCanvas.width = originalImage.width;
        dlCanvas.height = originalImage.height;
        var dlCtx = dlCanvas.getContext('2d');

        // 画原图
        dlCtx.drawImage(originalImage, 0, 0);

        // 应用滤镜
        var filter = document.getElementById('filterSelect').value;
        if (filter === 'grayscale') {
            var imgData = dlCtx.getImageData(0, 0, dlCanvas.width, dlCanvas.height);
            var d = imgData.data;
            for (var i = 0; i < d.length; i += 4) {
                var g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
                d[i] = d[i+1] = d[i+2] = g;
            }
            dlCtx.putImageData(imgData, 0, 0);
        } else if (filter === 'sepia') {
            var imgData = dlCtx.getImageData(0, 0, dlCanvas.width, dlCanvas.height);
            var d = imgData.data;
            for (var i = 0; i < d.length; i += 4) {
                var r = d[i], g = d[i+1], b = d[i+2];
                d[i]   = Math.min(255, r*0.393+g*0.769+b*0.189);
                d[i+1] = Math.min(255, r*0.349+g*0.686+b*0.168);
                d[i+2] = Math.min(255, r*0.272+g*0.534+b*0.131);
            }
            dlCtx.putImageData(imgData, 0, 0);
        } else if (filter === 'pixelate') {
            var tmp = document.createElement('canvas');
            var ps = 6;
            tmp.width = Math.ceil(originalImage.width / ps);
            tmp.height = Math.ceil(originalImage.height / ps);
            tmp.getContext('2d').drawImage(originalImage, 0, 0, tmp.width, tmp.height);
            dlCtx.imageSmoothingEnabled = false;
            dlCtx.clearRect(0, 0, dlCanvas.width, dlCanvas.height);
            dlCtx.drawImage(tmp, 0, 0, tmp.width, tmp.height, 0, 0, dlCanvas.width, dlCanvas.height);
            dlCtx.imageSmoothingEnabled = true;
        }

        // 文字（全尺寸）
        var topText = document.getElementById('topText').value;
        var topSize = parseInt(document.getElementById('topSize').value);
        var topColor = document.getElementById('topColor').value;
        var topShadow = document.getElementById('topShadow').value;
        var fontSize = topSize;
        dlCtx.font = `bold ${fontSize}px 'Press Start 2P', monospace`;
        dlCtx.textAlign = 'center';
        dlCtx.textBaseline = 'top';
        var x = dlCanvas.width / 2, y = fontSize * 0.6;
        if (topText) {
            if (topShadow !== 'none') {
                dlCtx.strokeStyle = topShadow === 'black' ? '#000' : '#fff';
                dlCtx.lineWidth = fontSize * 0.15; dlCtx.lineJoin = 'round';
                dlCtx.strokeText(topText, x, y);
            }
            dlCtx.shadowColor = '#000'; dlCtx.shadowBlur = fontSize * 0.3;
            dlCtx.fillStyle = topColor; dlCtx.fillText(topText, x, y);
            dlCtx.shadowBlur = 0;
        }

        var bottomText = document.getElementById('bottomText').value;
        var bottomSize = parseInt(document.getElementById('bottomSize').value);
        var bottomColor = document.getElementById('bottomColor').value;
        var bottomShadow = document.getElementById('bottomShadow').value;
        var bFontSize = bottomSize;
        dlCtx.font = `bold ${bFontSize}px 'Press Start 2P', monospace`;
        dlCtx.textBaseline = 'bottom';
        var by = dlCanvas.height - bFontSize * 0.3;
        if (bottomText) {
            if (bottomShadow !== 'none') {
                dlCtx.strokeStyle = bottomShadow === 'black' ? '#000' : '#fff';
                dlCtx.lineWidth = bFontSize * 0.15; dlCtx.lineJoin = 'round';
                dlCtx.strokeText(bottomText, x, by);
            }
            dlCtx.shadowColor = '#000'; dlCtx.shadowBlur = bFontSize * 0.3;
            dlCtx.fillStyle = bottomColor; dlCtx.fillText(bottomText, x, by);
            dlCtx.shadowBlur = 0;
        }

        var link = document.createElement('a');
        link.download = 'meme_' + Date.now() + '.png';
        link.href = dlCanvas.toDataURL('image/png');
        link.click();

        showToast('下载成功！');
    }

    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
