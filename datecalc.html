<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>­ЪЊЁ ТЌЦТюЪУ«Ау«ЌтЎе - PixelPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-black: #0a0a0a;
            --pixel-dark: #0f0f1a;
            --pixel-purple: #4a1982;
            --pixel-magenta: #e94560;
            --pixel-cyan: #00fff5;
            --pixel-yellow: #ffdd00;
            --pixel-green: #39ff14;
            --pixel-gray: #6b7280;
            --pixel-white: #f1f1f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: var(--pixel-white);
        }

        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.03) 0px,
                rgba(0,0,0,0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* т»╝УѕфТаЈ */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(26,26,46,0.98), rgba(10,10,26,0.95));
            border-bottom: 3px solid var(--pixel-cyan);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: var(--pixel-white);
        }

        .logo-icon {
            width: 34px; height: 34px;
            background: var(--pixel-cyan);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .logo-text { font-size: 12px; letter-spacing: 1px; }

        .back-link {
            color: var(--pixel-cyan);
            text-decoration: none;
            font-size: 11px;
            padding: 8px 12px;
            border: 2px solid var(--pixel-cyan);
            transition: all 0.2s;
        }

        .back-link:hover { background: var(--pixel-cyan); color: var(--pixel-black); }

        /* СИ╗т«╣тЎе */
        .container {
            max-width: 540px;
            margin: 0 auto;
            padding: 80px 16px 40px;
        }

        /* ТаЄжбў */
        .page-title {
            font-size: 20px;
            color: var(--pixel-yellow);
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 var(--pixel-purple);
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 2px 2px 0 var(--pixel-purple), 0 0 10px rgba(255,221,0,0.3); }
            50% { text-shadow: 2px 2px 0 var(--pixel-purple), 0 0 20px rgba(255,221,0,0.6); }
        }

        .page-sub {
            font-size: 12px;
            color: var(--pixel-gray);
            text-align: center;
            margin-bottom: 24px;
            line-height: 2;
        }

        /* ТеАт╝ЈТаЄуГЙ */
        .mode-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-tab {
            font-family: inherit;
            font-size: 12px;
            padding: 12px 16px;
            background: var(--pixel-dark);
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-gray);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .mode-tab:hover { border-color: var(--pixel-cyan); color: var(--pixel-cyan); }
        .mode-tab.active {
            border-color: var(--pixel-yellow);
            color: var(--pixel-yellow);
            background: rgba(255,221,0,.08);
        }

        /* У«Ау«Ќтї║ */
        .calc-box {
            background: var(--pixel-dark);
            border: 3px solid var(--pixel-purple);
            padding: 20px;
            margin-bottom: 16px;
        }

        /* ТЌЦТюЪУЙЊтЁЦУАї */
        .date-row {
            margin-bottom: 16px;
        }

        .date-row:last-child { margin-bottom: 0; }

        .row-label {
            font-size: 13px;
            color: var(--pixel-cyan);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-inputs {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .date-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-size: 11px;
            color: var(--pixel-gray);
            text-align: center;
        }

        .field-input {
            font-family: inherit;
            font-size: 18px;
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-white);
            padding: 10px 8px;
            text-align: center;
            outline: none;
            transition: border-color 0.15s;
        }

        .field-input:focus { border-color: var(--pixel-cyan); }
        .field-input::placeholder { color: var(--pixel-gray); font-size: 12px; }

        /* т╣┤ТюѕТЌЦтљёУЄфт«йт║д */
        .year-field { flex: 0 0 50px; }
        .year-input { width: 140px; font-size: 20px; padding: 16px 12px; }
        .month-input, .day-input { width: 72px; font-size: 18px; }

        /* ТїЅжњ« */
        .action-btn {
            width: 100%;
            font-family: inherit;
            font-size: 12px;
            padding: 16px;
            background: var(--pixel-magenta);
            border: 3px solid var(--pixel-magenta);
            color: var(--pixel-white);
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.15s;
        }

        .action-btn:hover { background: var(--pixel-cyan); border-color: var(--pixel-cyan); color: var(--pixel-black); }

        /* т┐ФТЇиУіѓТЌЦ */
        .quick-holiday {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,.08);
        }

        .quick-holiday-title {
            font-size: 11px;
            color: var(--pixel-gray);
            margin-bottom: 10px;
        }

        .quick-holiday-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .holiday-btn {
            font-family: inherit;
            font-size: 12px;
            padding: 8px 12px;
            background: var(--pixel-black);
            border: 2px solid var(--pixel-purple);
            color: var(--pixel-gray);
            cursor: pointer;
            transition: all 0.1s;
        }

        .holiday-btn:hover { border-color: var(--pixel-yellow); color: var(--pixel-yellow); }

        /* у╗ЊТъютї║ */
        .result-box {
            background: var(--pixel-black);
            border: 3px solid var(--pixel-yellow);
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .result-empty {
            font-size: 13px;
            color: var(--pixel-gray);
            line-height: 2.5;
        }

        .result-big {
            font-size: 26px;
            color: var(--pixel-yellow);
            text-shadow: 0 0 15px rgba(255,221,0,0.6);
            line-height: 1.6;
            word-break: break-word;
        }

        .result-big .accent { color: var(--pixel-cyan); text-shadow: 0 0 10px rgba(0,255,245,0.6); }

        .result-sub {
            font-size: 13px;
            color: var(--pixel-gray);
            line-height: 2.2;
        }

        .result-sub span { color: var(--pixel-white); }

        /* УХБтЉ│ТЈљуц║ */
        .fun-tip {
            background: rgba(57,255,20,.06);
            border: 2px solid var(--pixel-green);
            padding: 16px;
            font-size: 11px;
            color: var(--pixel-green);
            line-height: 2.4;
            margin-bottom: 16px;
        }

        .fun-tip::before { content: '­ЪњА '; }

        /* С╗іТЌЦС┐АТЂ» */
        .today-info {
            background: var(--pixel-dark);
            border: 2px solid var(--pixel-purple);
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 16px;
        }

        .today-item {
            text-align: center;
        }

        .today-item-label {
            font-size: 11px;
            color: var(--pixel-gray);
            margin-bottom: 6px;
        }

        .today-item-value {
            font-size: 14px;
            color: var(--pixel-cyan);
            text-shadow: 0 0 8px rgba(0,255,245,0.4);
        }

        /* ућЪТЌЦУЙЊтЁЦ */
        .birthday-tip {
            font-size: 12px;
            color: var(--pixel-gray);
            margin-top: 8px;
            line-height: 2;
        }

        /* тЊЇт║ћт╝Ј */
        @media (max-width: 480px) {
            .container { padding: 80px 12px 40px; }
            .page-title { font-size: 18px; }
            .mode-tab { font-size: 12px; padding: 12px 14px; }
            .field-input { font-size: 16px; padding: 10px 6px; }
            .year-field { flex: 0 0 50px; }
            .year-input { width: 140px; font-size: 18px; padding: 14px 10px; }
            .month-input, .day-input { width: 66px; font-size: 16px; }
            .result-big { font-size: 22px; }
            .action-btn { font-size: 14px; padding: 18px; }
            .today-info { flex-direction: column; align-items: center; }
            .today-item-value { font-size: 16px; }
            .result-sub { font-size: 14px; }
            .fun-tip { font-size: 13px; }
            .date-inputs { gap: 8px; }
        }

        @media (max-width: 360px) {
            .date-inputs { gap: 6px; }
            .year-field { flex: 0 0 50px; }
            .year-input { width: 140px; font-size: 16px; padding: 12px 8px; }
            .month-input, .day-input { width: 60px; font-size: 16px; }
            .field-input { padding: 10px 4px; }
        }
    </style>
</head>

    <script>
    // ============ ТЋ░ТЇ« ============
    var WEEKDAYS = ['ТўЪТюЪТЌЦ', 'ТўЪТюЪСИђ', 'ТўЪТюЪС║ї', 'ТўЪТюЪСИЅ', 'ТўЪТюЪтЏЏ', 'ТўЪТюЪС║ћ', 'ТўЪТюЪтЁГ'];
    var WEEKDAYS_SHORT = ['тЉеТЌЦ', 'тЉеСИђ', 'тЉеС║ї', 'тЉеСИЅ', 'тЉетЏЏ', 'тЉеС║ћ', 'тЉетЁГ'];

    // 2026т╣┤УіѓТЌЦ№╝ѕтЁгтјє№╝Ѕ
    var HOLIDAYS_2026 = [
        { name: 'тЁЃТЌд', date: '2026-01-01', emoji: '­ЪјЅ' },
        { name: 'ТўЦУіѓ', date: '2026-02-17', emoji: '­ЪДД' },
        { name: 'тЁЃт«хУіѓ', date: '2026-02-24', emoji: '­ЪЈ«' },
        { name: 'тдЄтЦ│Уіѓ', date: '2026-03-08', emoji: '­Ъїи' },
        { name: 'ТИЁТўјУіѓ', date: '2026-04-05', emoji: '­Ъї┐' },
        { name: 'ті│тіеУіѓ', date: '2026-05-01', emoji: '­Ъће' },
        { name: 'жЮњт╣┤Уіѓ', date: '2026-05-04', emoji: '­Ъї▒' },
        { name: 'тё┐уФЦУіѓ', date: '2026-06-01', emoji: '­Ъјѕ' },
        { name: 'уФ»тЇѕУіѓ', date: '2026-05-31', emoji: '­ЪљЅ' },
        { name: 'СИГуДІУіѓ', date: '2026-10-04', emoji: '­ЪЦ«' },
        { name: 'тЏйт║єУіѓ', date: '2026-10-01', emoji: '­ЪЄе­ЪЄ│' },
        { name: 'жЄЇжў│Уіѓ', date: '2026-10-29', emoji: '­Ъї╝' },
        { name: 'тюБУ»ъУіѓ', date: '2026-12-25', emoji: '­Ъјё' },
    ];

    var currentMode = 'diff';

    // ============ тиЦтЁитЄйТЋ░ ============
    function parseDateStr(str) {
        if (!str || str.trim() === '') return null;
        var parts = str.trim().split(/[-\/\.]/);
        if (parts.length === 3) {
            var y = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10) - 1;
            var d = parseInt(parts[2], 10);
            var date = new Date(y, m, d);
            if (date.getFullYear() === y && date.getMonth() === m && date.getDate() === d) {
                return date;
            }
        }
        return null;
    }

    function formatDate(date) {
        return date.getFullYear() + 'т╣┤' + (date.getMonth() + 1) + 'Тюѕ' + date.getDate() + 'ТЌЦ';
    }

    function formatDateShort(date) {
        return (date.getMonth() + 1) + '/' + date.getDate();
    }

    function getDaysDiff(d1, d2) {
        var diff = Math.abs(d2 - d1);
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getWeeksDays(days) {
        var weeks = Math.floor(days / 7);
        var remain = days % 7;
        return { weeks: weeks, days: remain };
    }

    function getMonthsDays(d1, d2) {
        var m1 = d1.getFullYear() * 12 + d1.getMonth();
        var m2 = d2.getFullYear() * 12 + d2.getMonth();
        var monthDiff = Math.abs(m2 - m1);
        var sign = d2 >= d1 ? 1 : -1;
        var dayDiff = d2.getDate() - d1.getDate();
        return { months: monthDiff, days: Math.abs(dayDiff), sign: sign };
    }

    function getWeekday(date) {
        return WEEKDAYS[date.getDay()];
    }

    function daysInYear(year) {
        return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0) ? 366 : 365;
    }

    function getDayOfYear(date) {
        var start = new Date(date.getFullYear(), 0, 0);
        var diff = date - start;
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getAge(birthday) {
        var today = new Date();
        var age = today.getFullYear() - birthday.getFullYear();
        var m = today.getMonth() - birthday.getMonth();
        var d = today.getDate() - birthday.getDate();
        if (d < 0) { m--; }
        if (m < 0) { age--; m += 12; }
        var totalDays = getDaysDiff(birthday, today);
        var years = age;
        var months = m;
        var days = d < 0 ? new Date(today.getFullYear(), today.getMonth(), 0).getDate() + d : d;
        return { years: years, months: months, days: days < 0 ? 0 : days, totalDays: totalDays };
    }

    // ============ С╗іТЌЦС┐АТЂ» ============
    function initTodayInfo() {
        var today = new Date();
        document.getElementById('todayDisplay').textContent = today.getFullYear() + '/' + (today.getMonth()+1) + '/' + today.getDate();
        document.getElementById('todayWeek').textContent = WEEKDAYS[today.getDay()];
        var doy = getDayOfYear(today);
        var total = daysInYear(today.getFullYear());
        document.getElementById('todayPassed').textContent = doy + 'тцЕ';
        document.getElementById('todayLeft').textContent = (total - doy) + 'тцЕ';
    }

    // ============ ТеАт╝ЈТИ▓ТЪЊ ============

                break;
            case 'countdown':
                html = '<div class="date-row"><div class="row-label">­Ъј» уЏ«ТаЄТЌЦТюЪ</div><div class="date-inputs"><div class="date-field year-field"><label class="field-label">т╣┤</label><input type="number" class="field-input year-input" id="cy" placeholder="2026" min="1" max="9999"></div><div class="date-field"><label class="field-label">Тюѕ</label><input type="number" class="field-input month-input" id="cm" placeholder="1" min="1" max="12"></div><div class="date-field"><label class="field-label">ТЌЦ</label><input type="number" class="field-input day-input" id="cd" placeholder="1" min="1" max="31"></div></div></div><div class="quick-holiday"><div class="quick-holiday-title">­ЪјЅ т┐ФТЇиУіѓТЌЦ</div><div class="quick-holiday-btns" id="countdownHolidayBtns"></div></div>';
                break;
            case 'calc':
                html = '<div class="date-row"><div class="row-label">­ЪЊЁ УхитДІТЌЦТюЪ</div><div class="date-inputs"><div class="date-field year-field"><label class="field-label">т╣┤</label><input type="number" class="field-input year-input" id="aky" placeholder="2026" min="1" max="9999"></div><div class="date-field"><label class="field-label">Тюѕ</label><input type="number" class="field-input month-input" id="akm" placeholder="1" min="1" max="12"></div><div class="date-field"><label class="field-label">ТЌЦ</label><input type="number" class="field-input day-input" id="akd" placeholder="1" min="1" max="31"></div></div></div><div class="date-row"><div class="row-label">РъЋРъќ тіатЄЈтцЕТЋ░</div><div class="date-inputs" style="align-items:center"><div class="date-field" style="flex:1"><input type="number" class="field-input" id="addDays" placeholder="УЙЊтЁЦтцЕТЋ░№╝їтдѓ100" style="text-align:center" value="100" min="-9999" max="9999"></div></div></div>';
                break;
            case 'weekday':

    function renderHolidayBtns() {
        var today = new Date();
        var futureHolidays = HOLIDAYS_2026.filter(function(h) {
            var hd = parseDateStr(h.date);
            return hd && hd >= today;
        }).slice(0, 6);

        // diffТеАт╝Јт┐ФТЇи
        var diffBtns = document.getElementById('diffHolidayBtns');
        if (diffBtns) {
            var todayStr = today.getFullYear() + '/' + (today.getMonth()+1) + '/' + today.getDate();
            diffBtns.innerHTML = '<button class="holiday-btn" onclick="fillDiffToday()">­ЪЊЁ С╗ітцЕ</button>' +
                futureHolidays.map(function(h) {
                    var hd = parseDateStr(h.date);
                    return '<button class="holiday-btn" onclick="fillDiff(\'' + h.date + '\')">' + h.emoji + ' ' + h.name + '</button>';
                }).join('');
        }

        // тђњУ«АТЌХт┐ФТЇи
        var cdBtns = document.getElementById('countdownHolidayBtns');
        if (cdBtns) {
            cdBtns.innerHTML = futureHolidays.map(function(h) {
                return '<button class="holiday-btn" onclick="fillCountdown(\'' + h.date + '\')">' + h.emoji + ' ' + h.name + '</button>';
            }).join('');
        }
    }

    function attachInputListeners() {
        var inputs = document.querySelectorAll('.field-input');
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].removeEventListener('input', autoCalc);
            inputs[i].removeEventListener('change', autoCalc);
            inputs[i].addEventListener('input', autoCalc);
            inputs[i].addEventListener('change', autoCalc);
        }
    }

    // ============ т┐ФТЇитАФтЁЁ ============
    function fillDiffToday() {
        var today = new Date();
        document.getElementById('y1').value = today.getFullYear();
        document.getElementById('m1').value = today.getMonth() + 1;
        document.getElementById('d1').value = today.getDate();
        autoCalc();
    }

    function fillDiff(dateStr) {
        var date = parseDateStr(dateStr);
        if (!date) return;
        document.getElementById('y2').value = date.getFullYear();
        document.getElementById('m2').value = date.getMonth() + 1;
        document.getElementById('d2').value = date.getDate();
        autoCalc();
    }

    function fillCountdown(dateStr) {
        var date = parseDateStr(dateStr);

    // ============ УЄфтіеУ«Ау«Ќ ============
    function autoCalc() {
        switch (currentMode) {
            case 'diff': calcDiff(); break;
            case 'countdown': calcCountdown(); break;
            case 'calc': calcDate(); break;
            case 'weekday': calcWeekday(); break;
            case 'age': calcAge(); break;
            case 'anniversary': calcAnniversary(); break;
        }
    }

    // ============ У«Ау«ЌтЄйТЋ░ ============
    function calcDiff() {
        var y1 = document.getElementById('y1').value;
        var m1 = document.getElementById('m1').value;
        var d1 = document.getElementById('d1').value;
        var y2 = document.getElementById('y2').value;
        var m2 = document.getElementById('m2').value;
        var d2 = document.getElementById('d2').value;

        if (!y1 || !m1 || !d1 || !y2 || !m2 || !d2) {
            showEmpty();
            return;
        }

        var date1 = new Date(parseInt(y1), parseInt(m1) - 1, parseInt(d1));
        var date2 = new Date(parseInt(y2), parseInt(m2) - 1, parseInt(d2));

        if (isNaN(date1) || isNaN(date2)) {
            showEmpty();
            return;
        }

        var days = getDaysDiff(date1, date2);
        var wd = getWeeksDays(days);
        var md = getMonthsDays(date1, date2);
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var fromToday = getDaysDiff(today, date2);
        var workdayCount = countWorkdays(Math.min(date1, date2), Math.max(date1, date2));

        var resultBox = document.getElementById('resultBox');
        var isFuture = date2 >= date1;

        var html = '<div class="result-big">' +
            (isFuture ? 'РЈ░ УиЮуд╗' : 'РЈф ти▓У┐Єтј╗') + '<br>' +
            formatDate(date1) + '<br>' +
            '<span class="accent">РЅѕ ' + days + ' тцЕ</span>' +
            '</div>';

        if (fromToday >= 0 && fromToday < 365 * 5) {
            html += '<div class="result-sub">' +
                'РЅѕ <span>' + md.months + ' СИфТюѕ ' + md.days + ' тцЕ</span><br>' +
                'РЅѕ <span>' + wd.weeks + ' тЉе ' + wd.days + ' тцЕ</span><br>' +
                'тиЦСйюТЌЦ№╝ѕТјњжЎцтЉеТюФ№╝Ѕ№╝џ<span>' + workdayCount + ' тцЕ</span>' +
                '</div>';
        }

        resultBox.innerHTML = html;

        // УХБтЉ│ТЈљуц║
        var tips = [
            '­ЪњА ' + days + ' тцЕ = ' + (days / 30.44).toFixed(1) + ' СИфТюѕ№╝ѕТїЅТюѕтЮЄ30.44тцЕ№╝Ѕ',
            '­ЪњА ' + days + ' тцЕ РЅѕ ' + (days / 365).toFixed(2) + ' т╣┤',
            '­ЪњА ' + days + ' тцЕжЄї№╝їСйатцДТдѓуЮАС║є ' + Math.floor(days * 8) + ' т░ЈТЌХ№╝Ђ',
            '­ЪњА ' + days + ' тцЕжЄї№╝їтю░уљЃу╗Ћтцфжў│УйгС║є ' + (days / 365.25).toFixed(4) + ' тюѕ',
        ];
        showTip(tips[Math.floor(Math.random() * tips.length)]);
    }

    function calcCountdown() {
        var cy = document.getElementById('cy').value;
        var cm = document.getElementById('cm').value;
        var cd = document.getElementById('cd').value;

        if (!cy || !cm || !cd) {
            showEmpty();
            return;
        }

        var target = new Date(parseInt(cy), parseInt(cm) - 1, parseInt(cd));
        if (isNaN(target)) {
            showEmpty();
            return;
        }

        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var diff = target - today;
        var days = Math.floor(diff / (1000 * 60 * 60 * 24));
        var totalHours = Math.floor(diff / (1000 * 60 * 60));
        var totalMinutes = Math.floor(diff / (1000 * 60));

        if (diff < 0) {
            var resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = '<div class="result-big">РЈф ти▓У┐Єтј╗<br><span class="accent">' + Math.abs(days) + ' тцЕ</span></div>';
            showTip('­ЪњА У┐ЎСИфТЌЦТюЪти▓у╗ЈУ┐ЄС║є ' + Math.abs(days) + ' тцЕтЋд№╝Ђ');
            return;
        }

        var wd = getWeeksDays(days);
        var doy = getDayOfYear(target);
        var weekday = getWeekday(target);

        var resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '<div class="result-big">РЈ░ УиЮуд╗<br><span class="accent">' + formatDate(target) + '</span><br>= <span class="accent">' + days + ' тцЕ</span></div>' +
            '<div class="result-sub">' +
            weekday + '№╝ѕугг' + doy + 'тцЕ№╝Ѕ<br>' +
            'РЅѕ <span>' + wd.weeks + ' тЉе ' + wd.days + ' тцЕ</span><br>' +
            (days < 30 ? 'РЅѕ <span>' + Math.floor(totalHours) + ' т░ЈТЌХ</span>' : '') +
            '</div>';

        // УХБтЉ│ТЈљуц║
        var tips = [
            '­ЪњА тєЇУ┐Є ' + days + ' тцЕ№╝їСйат░▒тЈ»С╗Цт║єуЦЮУ┐ЎСИфТЌЦтГљтЋд№╝Ђ',
            '­ЪњА ' + days + ' тцЕтљјТў» ' + weekday + '№╝їТў»СИфтЦйТЌЦтГљ№╝Ђ',
            '­ЪњА ' + days + ' тцЕ = ' + (days / 30.44).toFixed(1) + ' СИфТюѕ',
            '­ЪњА жѓБтцЕТў»С╗іт╣┤уџёугг ' + doy + ' тцЕ',
        ];
        showTip(tips[Math.floor(Math.random() * tips.length)]);
    }

    function calcDate() {
        var aky = document.getElementById('aky').value;
        var akm = document.getElementById('akm').value;
        var akd = document.getElementById('akd').value;
        var addDays = parseInt(document.getElementById('addDays') ? document.getElementById('addDays').value : '0', 10);

        if (!aky || !akm || !akd) {
            showEmpty();
            return;
        }

        var start = new Date(parseInt(aky), parseInt(akm) - 1, parseInt(akd));

            showEmpty();
            return;
        }

        var result = new Date(start.getTime() + addDays * 24 * 60 * 60 * 1000);
        var weekday = getWeekday(result);
        var doy = getDayOfYear(result);

        var resultBox = document.getElementById('resultBox');
        var sign = addDays >= 0 ? '+' : '';
        resultBox.innerHTML = '<div class="result-big">' + formatDate(start) + '<br>' +
            sign + addDays + ' тцЕ =<br>' +

            weekday + ' ┬и угг' + doy + 'тцЕ' +
            '</div>';

        showTip('­ЪњА ' + start.getFullYear() + 'т╣┤' + sign + addDays + 'тцЕ = ' + result.getFullYear() + 'т╣┤' + result.getMonth() + 1 + 'Тюѕ' + result.getDate() + 'ТЌЦ');
    }

    function calcWeekday() {
        var wy = document.getElementById('wy').value;
        var wm = document.getElementById('wm').value;
        var wd = document.getElementById('wd').value;

        if (!wy || !wm || !wd) {
            showEmpty();
            return;
        }

        var date = new Date(parseInt(wy), parseInt(wm) - 1, parseInt(wd));
        if (isNaN(date)) {
            showEmpty();
            return;
        }

        var weekday = getWeekday(date);
        var doy = getDayOfYear(date);
        var totalDays = daysInYear(date.getFullYear());

        var emojis = {
            'ТўЪТюЪТЌЦ': 'Рўђ№ИЈ',
            'ТўЪТюЪСИђ': '­ЪїЎ',
            'ТўЪТюЪС║ї': '­ЪїЪ',
            'ТўЪТюЪСИЅ': '­ЪњФ',
            'ТўЪТюЪтЏЏ': 'Рюе',
            'ТўЪТюЪС║ћ': '­ЪјЅ',
            'ТўЪТюЪтЁГ': '­Ъїѕ'
        };

        var resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '<div class="result-big">' + formatDate(date) + '<br>' +
            emojis[weekday] + ' <span class="accent">' + weekday + '</span></div>' +
            '<div class="result-sub">' +
            'угг <span>' + doy + '</span> тцЕ№╝ѕ' + doy + '/' + totalDays + '№╝Ѕ<br>' +
            'С╗іт╣┤тЅЕСйЎ <span>' + (totalDays - doy) + '</span> тцЕ' +
            '</div>';

        // ућЪТЌЦуЏИтЁ│
        var today = new Date();
        if (date.getMonth() === today.getMonth() && date.getDate() === today.getDate()) {
            showTip('­Ъјѓ тЊЄ№╝ЂС╗ітцЕт░▒Тў»У┐ЎСИђтцЕ№╝ЂућЪТЌЦт┐ФС╣љ№╝Ђ');
        } else {
            var birthYear = date.getFullYear();
            var age = today.getFullYear() - birthYear;
            if (date < today) age--;
            showTip('­ЪњА тдѓТъюТў»ућЪТЌЦ№╝їСйаС╗іт╣┤т░▒Т╗А ' + age + ' т▓ЂС║є№╝Ђ');
        }
    }

    function calcAge() {
        var by = document.getElementById('by').value;
        var bm = document.getElementById('bm').value;
        var bd = document.getElementById('bd').value;

        if (!by || !bm || !bd) {
            showEmpty();
            return;
        }

        var birthday = new Date(parseInt(by), parseInt(bm) - 1, parseInt(bd));
        if (isNaN(birthday)) {
            showEmpty();
            return;
        }

        var today = new Date();
        if (birthday > today) {
            var resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = '<div class="result-big">­Ъцћ У┐ўТ▓Атѕ░тЉб№╝Ђ<br><span class="accent">тЄ║ућЪТЌЦТюЪСИЇУЃйТў»ТюфТЮЦ</span></div>';
            showTip('­ЪњА тЄ║ућЪТЌЦТюЪСИЇУЃйтюеТюфТЮЦтЊд№йъ');
            return;
        }

        var age = getAge(birthday);
        var weekday = getWeekday(birthday);

        // СИІТгАућЪТЌЦ
        var nextBirthday = new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate());
        if (nextBirthday < today) {
            nextBirthday = new Date(today.getFullYear() + 1, birthday.getMonth(), birthday.getDate());
        }
        var daysToBirthday = getDaysDiff(today, nextBirthday);

        var resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '<div class="result-big">­Ъјѓ <span class="accent">' + age.years + ' т▓Ђ</span></div>' +
            '<div class="result-sub">' +
            'ти▓Т┤╗ <span>' + age.totalDays + '</span> тцЕ<br>' +
            'у▓ЙуА«т╣┤жЙё№╝џ<span>' + age.years + ' т▓Ђ ' + age.months + ' СИфТюѕ ' + age.days + ' тцЕ</span><br>' +
            'СИІТгАућЪТЌЦ№╝џ<span>' + daysToBirthday + ' тцЕтљј№╝ѕ' + formatDateShort(nextBirthday) + '№╝Ѕ</span>' +
            '</div>';

        var tips = [
            '­ЪњА Сйати▓у╗ЈТ┤╗С║є ' + age.totalDays + ' тцЕ№╝їу║д ' + (age.totalDays / 365).toFixed(1) + ' т╣┤№╝Ђ',
            '­ЪњА тєЇУ┐Є ' + daysToBirthday + ' тцЕт░▒Тў»СйауџёућЪТЌЦтЋд№╝Ђ',
            '­ЪњА тЄ║ућЪжѓБтцЕТў» ' + weekday + '№╝їТў»СИфтЦйТЌЦтГљ№╝Ђ',
            '­ЪњА тѕ░уЏ«тЅЇСИ║ТГб№╝їСйатцДТдѓуЮАС║є ' + Math.floor(age.totalDays * 8) + ' т░ЈТЌХ ­Ъў┤',
        ];
        showTip(tips[Math.floor(Math.random() * tips.length)]);
    }

    function calcAnniversary() {
        var any = document.getElementById('any').value;
        var anm = document.getElementById('anm').value;
        var and = document.getElementById('and').value;

        if (!any || !anm || !and) {
            showEmpty();
            return;
        }

        var start = new Date(parseInt(any), parseInt(anm) - 1, parseInt(and));
        if (isNaN(start)) {
            showEmpty();
            return;
        }

        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var diff = today - start;

        if (diff < 0) {
            var resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = '<div class="result-big">­Ъцћ У┐ўТ▓Атѕ░тЉб№╝Ђ<br><span class="accent">у║фт┐хТЌЦСИЇУЃйТў»ТюфТЮЦ</span></div>';
            showTip('­ЪњА у║фт┐хТЌЦСИЇУЃйтюеТюфТЮЦтЊд№йъ');
            return;
        }

        var days = getDaysDiff(start, today);
        var months = Math.floor(days / 30.44);
        var years = Math.floor(days / 365.25);

        // СИІСИфТЋ┤ТЋ░у║фт┐хТЌЦ
        var next100 = Math.ceil(days / 100) * 100;
        var next1000 = Math.ceil(days / 1000) * 1000;
        var next10000 = Math.ceil(days / 10000) * 10000;
        var nextAnniv = new Date(start.getTime() + next100 * 24 * 60 * 60 * 1000);
        var daysToNext = next100 - days;

        var resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '<div class="result-big">­ЪњЉ тюеСИђУхи<br><span class="accent">' + days + ' тцЕ</span></div>' +
            '<div class="result-sub">' +
            'РЅѕ <span>' + months + ' СИфТюѕ</span><br>' +
            'РЅѕ <span>' + years + ' т╣┤</span><br>' +
            'СИІСИђСИфТЋ┤ТЋ░у║фт┐хТЌЦ№╝џ<span>' + next100 + 'тцЕ№╝ѕ' + formatDateShort(nextAnniv) + '№╝їУ┐ўти«' + daysToNext + 'тцЕ№╝Ѕ</span>' +
            '</div>';

        var tips = [
            '­ЪњА 100тцЕ = у║д3.3СИфТюѕ№╝їСйаС╗гти▓у╗ЈСИђУхиУх░У┐ЄС║єтЙѕтцџТЌЦтГљ ­ЪњЋ',
            '­ЪњА ' + days + ' тцЕ = ' + (days / 7).toFixed(0) + ' тЉе№╝їСйаС╗гтюеСИђУхи ' + (days / 7).toFixed(0) + ' тЉеС║є№╝Ђ',
            '­ЪњА С║║ућЪу║д ' + (days / 365.25 * 100).toFixed(1) + '% уџёТЌХжЌ┤жЃйтюеСИђУхи РЮц№ИЈ',
            '­ЪњА ' + days + ' тцЕжЄї№╝їСйатцДТдѓугЉС║є ' + Math.floor(days * 30) + ' ТгА ­Ъўё',
        ];
        showTip(tips[Math.floor(Math.random() * tips.length)]);
    }

    function countWorkdays(d1, d2) {
        var count = 0;
        var cur = new Date(d1);
        cur.setHours(0, 0, 0, 0);
        var end = new Date(d2);
        end.setHours(0, 0, 0, 0);
        while (cur <= end) {
            var day = cur.getDay();
            if (day !== 0 && day !== 6) count++;
            cur.setDate(cur.getDate() + 1);
        }
        return count;
    }

    function showEmpty() {
        document.getElementById('resultBox').innerHTML = '<div class="result-empty">­ЪЊІ УЙЊтЁЦТЌЦТюЪ№╝їтЇ│тЈ»ТЪЦуюІу╗ЊТъю</div>';
        document.getElementById('funTip').style.display = 'none';
    }

    function showTip(tip) {
        var el = document.getElementById('funTip');
        el.textContent = tip;
        el.style.display = 'block';
    }

    // ============ ТеАт╝ЈтѕЄТЇб ============
    document.getElementById('modeTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.mode-tab');

        tab.classList.add('active');
        currentMode = tab.dataset.mode;

    // ============ тѕЮтДІтїќ ============
    initTodayInfo();
